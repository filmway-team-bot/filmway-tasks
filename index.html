<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmway AI — Task Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --card:        #1a1a2e;
      --accent:      #e94560;
      --accent2:     #c73652;
      --text:        #ffffff;
      --text-muted:  #8892a4;
      --done:        #2ecc71;
      --border:      rgba(233,69,96,.25);
      --shadow:      0 8px 32px rgba(0,0,0,.6);
      --radius:      12px;
      --time-color:  #4fc3f7;
      --time-bg:     rgba(79,195,247,.10);
      --time-border: rgba(79,195,247,.28);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      padding: 28px 32px 20px;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 60%, #0a0a0a 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px;
      flex-wrap: wrap;
    }

    .logo-wrap { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(233,69,96,.45);
      flex-shrink: 0;
    }

    h1 { font-size: clamp(1.2rem, 4vw, 1.75rem); font-weight: 700; letter-spacing: -.5px; line-height: 1.15; }
    h1 span { color: var(--accent); }

    .header-meta { margin-left: auto; text-align: right; font-size: .78rem; color: var(--text-muted); line-height: 1.6; }
    .header-meta strong { color: var(--text); }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs-bar {
      position: relative; z-index: 10;
      display: flex; gap: 4px;
      padding: 16px 32px 0;
      background: #0d0d1a;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 10px 22px;
      border: none; background: transparent;
      color: var(--text-muted);
      font-size: .9rem; font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
      transition: color .2s, background .2s;
      white-space: nowrap;
      position: relative;
    }

    .tab-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: var(--accent);
      transition: left .25s, right .25s;
      border-radius: 2px 2px 0 0;
    }

    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .tab-btn.active { color: var(--text); background: rgba(233,69,96,.08); }
    .tab-btn.active::after { left: 12px; right: 12px; }

    .tab-btn .badge {
      display: inline-block; margin-left: 6px;
      padding: 1px 7px; border-radius: 999px;
      font-size: .7rem; background: var(--accent); color: #fff;
      vertical-align: middle;
      opacity: 0; transform: scale(.7);
      transition: opacity .2s, transform .2s;
    }
    .tab-btn .badge.visible { opacity: 1; transform: scale(1); }

    /* ── Main ────────────────────────────────────────────── */
    main {
      position: relative; z-index: 5;
      padding: 28px 32px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp .35s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Period header ───────────────────────────────────── */
    .period-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 22px; flex-wrap: wrap;
    }

    .period-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    .period-date {
      font-size: .8rem; color: var(--accent);
      background: rgba(233,69,96,.1);
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid rgba(233,69,96,.3);
    }

    /* ── Progress bar ────────────────────────────────────── */
    .progress-wrap {
      background: rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 18px 22px; margin-bottom: 24px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }

    .progress-label { font-size: .85rem; color: var(--text-muted); min-width: 110px; }

    .progress-bar-outer {
      flex: 1; min-width: 120px; height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px; overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6b6b);
      border-radius: 999px;
      transition: width .7s cubic-bezier(.4,0,.2,1);
      width: 0%;
      box-shadow: 0 0 10px rgba(233,69,96,.5);
    }

    .progress-pct { font-size: 1rem; font-weight: 700; color: var(--text); min-width: 44px; text-align: right; }
    .progress-count { font-size: .8rem; color: var(--text-muted); }

    /* ── Task list ───────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Task card ───────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: cardIn .3s ease both;
      position: relative; overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      opacity: 0; transition: opacity .2s;
    }

    .task-card:hover { transform: translateX(3px); box-shadow: var(--shadow); border-color: rgba(233,69,96,.4); }
    .task-card:hover::before { opacity: 1; }
    .task-card.done { opacity: .65; }
    .task-card.done::before { background: var(--done); opacity: .6; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-card:nth-child(1)  { animation-delay: .02s; }
    .task-card:nth-child(2)  { animation-delay: .05s; }
    .task-card:nth-child(3)  { animation-delay: .08s; }
    .task-card:nth-child(4)  { animation-delay: .11s; }
    .task-card:nth-child(5)  { animation-delay: .14s; }
    .task-card:nth-child(6)  { animation-delay: .17s; }
    .task-card:nth-child(7)  { animation-delay: .20s; }
    .task-card:nth-child(8)  { animation-delay: .23s; }
    .task-card:nth-child(9)  { animation-delay: .26s; }
    .task-card:nth-child(10) { animation-delay: .29s; }

    /* ── Checkbox ────────────────────────────────────────── */
    .task-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 5px; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      cursor: pointer;
      user-select: none;
    }

    .task-check:hover { border-color: var(--done); background: rgba(46,204,113,.08); }

    .task-check.checked { background: var(--done); border-color: var(--done); }

    .task-check.checked::after {
      content: '';
      display: block; width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* ── Task body ───────────────────────────────────────── */
    .task-body { flex: 1; min-width: 0; }

    .task-text { font-size: .93rem; line-height: 1.5; word-break: break-word; transition: color .2s; }
    .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }

    .task-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    .meta-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .73rem; padding: 2px 9px;
      border-radius: 999px; font-weight: 600;
    }

    .chip-person   { background: rgba(233,69,96,.12); color: var(--accent); border: 1px solid rgba(233,69,96,.25); }
    .chip-deadline { background: rgba(255,190,11,.10); color: #ffbe0b;      border: 1px solid rgba(255,190,11,.25); }
    .chip-time     { background: var(--time-bg);       color: var(--time-color); border: 1px solid var(--time-border); }
    .chip-period   { background: rgba(139,92,246,.10); color: #a78bfa;      border: 1px solid rgba(139,92,246,.25); }

    /* ── Section heading ─────────────────────────────────── */
    .section-heading {
      font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted);
      margin: 18px 0 8px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }

    /* ── Person heading (Команда tab) ────────────────────── */
    .person-heading {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 10px;
      padding: 12px 16px;
      background: rgba(233,69,96,.06);
      border-radius: var(--radius);
      border: 1px solid rgba(233,69,96,.15);
    }

    .person-avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }

    .person-name { font-size: 1rem; font-weight: 700; }
    .person-count { margin-left: auto; font-size: .8rem; color: var(--text-muted); }

    /* ── Files panel ─────────────────────────────────────── */
    .files-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }

    .upload-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: .88rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .upload-btn:hover { background: var(--accent2); transform: translateY(-1px); }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: cardIn .3s ease both;
    }

    .file-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: rgba(233,69,96,.4); }

    .file-icon {
      font-size: 26px; flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05); border-radius: 8px;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: .88rem; font-weight: 600; word-break: break-all; margin-bottom: 4px; }
    .file-size { font-size: .74rem; color: var(--text-muted); }

    .file-dl {
      flex-shrink: 0;
      color: var(--accent);
      font-size: .8rem; font-weight: 600;
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid rgba(233,69,96,.3);
      border-radius: 6px;
      transition: background .2s;
    }
    .file-dl:hover { background: rgba(233,69,96,.1); }

    /* ── Empty / loading ─────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; display: block; }
    .empty-state p { font-size: .95rem; }
    .empty-state a { color: var(--accent); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 50px 20px;
      color: var(--text-muted); font-size: .9rem;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(233,69,96,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 16px;
      font-size: .75rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 18px 16px 14px; }
      .tabs-bar { padding: 12px 16px 0; }
      main { padding: 18px 16px 36px; }
      .tab-btn { padding: 8px 14px; font-size: .82rem; }
      .file-grid { grid-template-columns: 1fr; }
    }
  
    /* ── Лого ─────────────────────────────────── */
    .site-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 0 8px;
      background: var(--bg);
    }
    .site-logo {
      height: 52px;
      width: auto;
      display: block;
    }
    @media (prefers-color-scheme: dark) {
      .site-logo { filter: brightness(0.9); }
    }
  
    /* ── Прикреплённые ссылки к задачам ──────────────────────── */
    .task-attach-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; opacity: 0.4; padding: 0 2px;
      transition: opacity .15s; vertical-align: middle;
      line-height: 1;
    }
    .task-attach-btn:hover { opacity: 1; }
    .task-links {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin: 3px 0 2px 22px;
    }
    .task-link-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f0f4ff; border: 1px solid #c5d0f0;
      border-radius: 12px; padding: 2px 8px;
      font-size: 11px; color: #3355cc; text-decoration: none;
      max-width: 280px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-link-chip:hover { background: #dde6ff; }
    .task-link-chip .del-link {
      color: #999; cursor: pointer; font-size: 13px;
      line-height: 1; margin-left: 2px; flex-shrink: 0;
    }
    .task-link-chip .del-link:hover { color: #c00; }
    .attach-input-row {
      display: none; margin: 3px 0 4px 22px; gap: 4px;
    }
    .attach-input-row.open { display: flex; }
    .attach-input-row input {
      flex: 1; font-size: 12px; padding: 3px 7px;
      border: 1px solid #c5d0f0; border-radius: 8px; outline: none;
      min-width: 0;
    }
    .attach-input-row input:focus { border-color: #3355cc; }
    .attach-input-row button {
      font-size: 12px; padding: 3px 10px;
      background: #3355cc; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; white-space: nowrap;
    }
    .attach-input-row button:hover { background: #2244bb; }
    .attach-cancel { background: #eee !important; color: #555 !important; }
    .attach-cancel:hover { background: #ddd !important; }
  
    /* ── Layout: sidebar + main ───────────────────────────────── */
    body { margin: 0; }
    .fw-layout {
      display: flex;
      min-height: 100vh;
      gap: 0;
    }
    .fw-sidebar-left, .fw-sidebar-right {
      width: 220px;
      min-width: 220px;
      background: var(--bg, #f8f9fa);
      border-right: 1px solid var(--border, #e0e0e0);
      padding: 12px 10px;
      box-sizing: border-box;
      overflow-y: auto;
      transition: width .2s, min-width .2s, padding .2s;
      font-size: 13px;
    }
    .fw-sidebar-right {
      border-right: none;
      border-left: 1px solid var(--border, #e0e0e0);
    }
    .fw-sidebar-left.collapsed, .fw-sidebar-right.collapsed {
      width: 0; min-width: 0; padding: 0; overflow: hidden;
    }
    .fw-main { flex: 1; min-width: 0; padding: 0 8px; }
    .fw-sidebar-toggle {
      background: none; border: 1px solid var(--border, #ccc);
      border-radius: 6px; cursor: pointer; font-size: 14px;
      padding: 2px 7px; margin: 4px 2px; color: var(--text, #333);
    }
    .fw-sidebar-toggle:hover { background: var(--hover, #eee); }

    /* ── Команда (левая панель) ──────────────────────────────── */
    .sidebar-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #888; margin: 0 0 8px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border, #e0e0e0);
    }
    .team-member {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 4px; border-radius: 7px; cursor: pointer;
      transition: background .12s; margin-bottom: 2px;
    }
    .team-member:hover { background: var(--hover, #eee); }
    .team-member.active { background: #e8f0fe; }
    .member-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #c5d0f0; display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700;
      color: #3355cc; flex-shrink: 0; text-transform: uppercase;
    }
    .member-info { min-width: 0; }
    .member-name { font-weight: 600; font-size: 12px; }
    .member-tasks { font-size: 10px; color: #888; }
    .member-filter-clear {
      font-size: 11px; color: #3355cc; cursor: pointer;
      padding: 2px 4px; margin-top: 4px; display: none;
    }
    .member-filter-clear.visible { display: block; }

    /* ── Быстрые действия (правая панель) ───────────────────── */
    .quick-add-form { margin-bottom: 14px; }
    .quick-add-form textarea {
      width: 100%; box-sizing: border-box; resize: vertical;
      border: 1px solid var(--border, #ccc); border-radius: 7px;
      padding: 6px 8px; font-size: 12px; font-family: inherit;
      background: var(--input-bg, #fff); color: var(--text, #222);
      min-height: 54px;
    }
    .quick-add-form textarea:focus { outline: none; border-color: #3355cc; }
    .quick-add-row { display: flex; gap: 4px; margin-top: 4px; }
    .quick-add-row select, .quick-add-row button {
      font-size: 11px; padding: 3px 6px; border-radius: 6px;
      border: 1px solid var(--border, #ccc);
      background: var(--input-bg, #fff); color: var(--text, #222);
    }
    .quick-add-row button {
      background: #3355cc; color: #fff; border-color: #3355cc;
      cursor: pointer; flex-shrink: 0;
    }
    .quick-add-row button:hover { background: #2244bb; }

    .activity-log { font-size: 11px; }
    .activity-item {
      padding: 4px 0; border-bottom: 1px solid var(--border, #eee);
      color: #666; line-height: 1.35;
    }
    .activity-item .act-time { color: #aaa; }

    /* ── Поиск ──────────────────────────────────────────────── */
    .fw-search-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 0 4px;
    }
    .fw-search {
      flex: 1; padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--border, #ccc); font-size: 13px;
      background: var(--input-bg, #fff); color: var(--text, #222);
    }
    .fw-search:focus { outline: none; border-color: #3355cc; }
    .fw-search-count { font-size: 11px; color: #888; white-space: nowrap; }
    .task-hidden-by-search { display: none !important; }

    /* ── Авто-обновление ────────────────────────────────────── */
    .fw-refresh-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #aaa; padding: 2px 0 6px;
    }
    .fw-refresh-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4caf50; display: inline-block;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: .3; }
    }
    .fw-refresh-bar.refreshing .fw-refresh-dot { background: #ff9800; }

    /* ── Редактирование задачи ──────────────────────────────── */
    .task-edit-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; opacity: 0; padding: 0 3px;
      transition: opacity .15s; color: #888;
      vertical-align: middle;
    }
    .task-item:hover .task-edit-btn,
    li:hover .task-edit-btn { opacity: 1; }
    .task-edit-input {
      font-size: inherit; font-family: inherit;
      border: 1px solid #3355cc; border-radius: 5px;
      padding: 2px 6px; background: var(--input-bg, #fff);
      color: var(--text, #222); width: calc(100% - 28px);
      box-sizing: border-box;
    }
    .task-edit-input:focus { outline: none; }
    .task-edit-actions {
      font-size: 11px; margin-top: 2px; display: none;
    }

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const REPO   = 'filmway-team-bot/filmway-tasks';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const API    = `https://api.github.com/repos/${REPO}/`;

const PERIODS = {
  day:      { label: 'День',    fn: () => `tasks/day/${todayStr()}.md` },
  week:     { label: 'Неделя',  fn: () => `tasks/week/${weekStr()}.md` },
  month:    { label: 'Месяц',   fn: () => `tasks/month/${monthStr()}.md` },
  halfyear: { label: 'Полгода', fn: () => `tasks/halfyear/${halfyearStr()}.md` },
  year:     { label: 'Год',     fn: () => `tasks/year/${yearStr()}.md` },
};

/* ══════════════════════════════════════════════════════════
   DATE HELPERS
══════════════════════════════════════════════════════════ */
const pad = n => String(n).padStart(2, '0');

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function weekStr() {
  const d = new Date(), jan1 = new Date(d.getFullYear(), 0, 1);
  const w = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${pad(w)}`;
}

function monthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function halfyearStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() < 6 ? 'H1' : 'H2'}`;
}

function yearStr() { return String(new Date().getFullYear()); }

function humanDate(s) {
  if (s.includes('-W')) return `Неделя ${s.split('-W')[1]}, ${s.split('-')[0]}`;
  if (s.includes('-H')) return s.replace('H1','первое полугодие').replace('H2','второе полугодие');
  if (/^\d{4}$/.test(s)) return s;
  if (/\d{4}-\d{2}-\d{2}/.test(s)) {
    const [y,m,dd] = s.split('-');
    const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    return `${+dd} ${mo[+m-1]} ${y}`;
  }
  if (/\d{4}-\d{2}/.test(s)) {
    const [y,m] = s.split('-');
    const mo = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    return `${mo[+m-1]} ${y}`;
  }
  return s;
}

function formatSize(b) {
  if (b < 1024)       return b + ' Б';
  if (b < 1048576)    return (b/1024).toFixed(1) + ' КБ';
  return (b/1048576).toFixed(1) + ' МБ';
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return { pdf:'📄',mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',webm:'🎬',
    mp3:'🎵',wav:'🎵',aac:'🎵',flac:'🎵',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',
    doc:'📝',docx:'📝',txt:'📝',md:'📝',
    xls:'📊',xlsx:'📊',csv:'📊',
    zip:'🗜️',rar:'🗜️','7z':'🗜️',
    ppt:'📋',pptx:'📋',
    ai:'🎨',psd:'🎨',fig:'🎨',sketch:'🎨',
  }[ext] || '📎';
}

/* ══════════════════════════════════════════════════════════
   LOCALSTORAGE — checkbox state
══════════════════════════════════════════════════════════ */
function taskKey(period, rawText) {
  const s = period + '|' + rawText.slice(0, 80);
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return 'fw_' + (h >>> 0).toString(36);
}

function storedDone(key, fallback) {
  const v = localStorage.getItem(key);
  return v === 'done' ? true : v === 'todo' ? false : fallback;
}

function toggleStored(key, currentDone) {
  localStorage.setItem(key, currentDone ? 'todo' : 'done');
}

/* ══════════════════════════════════════════════════════════
   FETCH
══════════════════════════════════════════════════════════ */
async function fetchMd(filename) {
  try {
    const r = await fetch(RAW + filename + '?_=' + Date.now());
    return r.ok ? r.text() : null;
  } catch { return null; }
}

/* ══════════════════════════════════════════════════════════
   PARSE MARKDOWN
══════════════════════════════════════════════════════════ */
function parseMd(md, period) {
  const items = [];
  let section = '';

  for (const raw of md.split('\n')) {
    const line = raw.trimEnd();

    if (/^#+\s/.test(line)) {
      section = line.replace(/^#+\s*/, '').trim();
      continue;
    }

    const mDone = line.match(/^[-*]\s+\[x\]\s+(.*)/i);
    const mTodo = line.match(/^[-*]\s+\[ \]\s+(.*)/);
    if (!mDone && !mTodo) continue;

    const origDone = !!mDone;
    const full     = (origDone ? mDone[1] : mTodo[1]).trim();

    // time range: 12:00-18:00 / 12:00–18:00
    const tMatch = full.match(/(\d{1,2}:\d{2})\s*[–\-—]\s*(\d{1,2}:\d{2})/);
    const timeRange = tMatch ? `${tMatch[1]}–${tMatch[2]}` : null;

    // person: — Имя or @handle
    const pMatch = full.match(/—\s*([А-ЯЁ][а-яё]+(?:\s+[А-ЯЁ][а-яё]+)?)/u)
                || full.match(/@([\w\d_]+)/);
    const person  = pMatch ? pMatch[0].replace(/^—\s*/, '').trim() : null;

    // deadline: до ДД.ММ
    const dMatch   = full.match(/до\s+(\d{1,2}\.\d{2}(?:\.\d{2,4})?)/);
    const deadline = dMatch ? dMatch[1] : null;

    // clean text
    let text = full
      .replace(/(\d{1,2}:\d{2})\s*[–\-—]\s*(\d{1,2}:\d{2})/, '')
      .replace(/—\s*[А-ЯЁ][а-яё]+(?:\s+[А-ЯЁ][а-яё]+)?/u, '')
      .replace(/@[\w\d_]+/, '')
      .replace(/до\s+\d{1,2}\.\d{2}(?:\.\d{2,4})?/, '')
      .replace(/\s{2,}/g, ' ').trim().replace(/^[-—]\s*/, '');
    if (!text) text = full;

    const key  = taskKey(period, full);
    const done = storedDone(key, origDone);

    items.push({ done, origDone, text, person, deadline, timeRange, section, key });
  }
  return items;
}

/* ══════════════════════════════════════════════════════════
   RENDER CARD
══════════════════════════════════════════════════════════ */
function card(task, extra = '') {
  const done = task.done;
  let meta = '';
  if (task.timeRange) meta += `<span class="meta-chip chip-time">⏰ ${esc(task.timeRange)}</span>`;
  if (task.person)    meta += `<span class="meta-chip chip-person">👤 ${esc(task.person)}</span>`;
  if (task.deadline)  meta += `<span class="meta-chip chip-deadline">📅 до ${esc(task.deadline)}</span>`;
  meta += extra;

  return `<div class="task-card${done?' done':''}" data-key="${esc(task.key)}" data-done="${done}">
    <div class="task-check${done?' checked':''}" role="checkbox" aria-checked="${done}" tabindex="0"></div>
    <div class="task-body">
      <div class="task-text">${esc(task.text)}</div>
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   RENDER PERIOD PANEL
══════════════════════════════════════════════════════════ */
function renderPeriod(el, period, filename, tasks) {
  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const fbase = filename.split('/').pop().replace('.md','');

  let h = `<div class="period-header">
    <span class="period-title">${PERIODS[period].label}</span>
    <span class="period-date">${humanDate(fbase)}</span>
  </div>`;

  if (total > 0) h += `<div class="progress-wrap">
    <span class="progress-label">Прогресс</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="pb-${period}"></div></div>
    <span class="progress-pct">${pct}%</span>
    <span class="progress-count">${done}/${total} выполнено</span>
  </div>`;

  h += `<div class="task-list">`;
  for (const sec of [...new Set(tasks.map(t => t.section))]) {
    if (sec) h += `<div class="section-heading">${esc(sec)}</div>`;
    tasks.filter(t => t.section === sec).forEach(t => { h += card(t); });
  }
  h += `</div>`;

  el.innerHTML = h;

  requestAnimationFrame(() => {
    const pb = document.getElementById(`pb-${period}`);
    if (pb) pb.style.width = pct + '%';
  });

  const badge = document.getElementById(`badge-${period}`);
  if (badge && total > 0) {
    badge.textContent = (total - done) || '✓';
    badge.classList.add('visible');
  }
}

function renderEmpty(el, period, filename) {
  const fbase = filename.split('/').pop();
  el.innerHTML = `<div class="period-header">
    <span class="period-title">${PERIODS[period].label}</span>
    <span class="period-date">${humanDate(fbase.replace('.md',''))}</span>
  </div>
  <div class="empty-state">
    <span class="empty-icon">📭</span>
    <p>Задач нет</p>
    <p style="margin-top:6px;font-size:.8rem">Файл <code>${filename}</code> не найден или пуст</p>
  </div>`;
}

function renderLoading(el) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div> Загрузка…</div>`;
}

/* ══════════════════════════════════════════════════════════
   TEAM PANEL
══════════════════════════════════════════════════════════ */
async function loadTeam() {
  const el = document.getElementById('panel-team');
  renderLoading(el);

  const periodsList = { day:'День', week:'Неделя', month:'Месяц' };
  const all = [];

  for (const [period, lbl] of Object.entries(periodsList)) {
    const md = await fetchMd(PERIODS[period].fn());
    if (!md) continue;
    parseMd(md, period).forEach(t => all.push({ ...t, periodLabel: lbl }));
  }

  if (!all.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">👥</span>
      <p>Нет задач с исполнителями</p>
      <p style="margin-top:6px;font-size:.8rem">Добавьте имена через «—» в файлах задач</p>
    </div>`;
    return;
  }

  const byPerson = {};
  const noPerson = [];
  for (const t of all) {
    t.person ? (byPerson[t.person] = byPerson[t.person] || [], byPerson[t.person].push(t))
             : noPerson.push(t);
  }

  let h = `<div class="period-header">
    <span class="period-title">Команда</span>
    <span class="period-date">День · Неделя · Месяц</span>
  </div>`;

  for (const [person, tasks] of Object.entries(byPerson)) {
    const ini = person.replace(/[@]/g,'').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
    const dc  = tasks.filter(t=>t.done).length;
    h += `<div class="person-heading">
      <div class="person-avatar">${ini||'?'}</div>
      <span class="person-name">${esc(person)}</span>
      <span class="person-count">${dc}/${tasks.length} выполнено</span>
    </div><div class="task-list">`;
    tasks.forEach(t => {
      h += card(t, `<span class="meta-chip chip-period">📅 ${esc(t.periodLabel)}</span>`);
    });
    h += `</div>`;
  }

  if (noPerson.length) {
    h += `<div class="person-heading" style="margin-top:28px">
      <div class="person-avatar">?</div>
      <span class="person-name">Без исполнителя</span>
      <span class="person-count">${noPerson.length} задач</span>
    </div><div class="task-list">`;
    noPerson.forEach(t => {
      h += card(t, `<span class="meta-chip chip-period">📅 ${esc(t.periodLabel)}</span>`);
    });
    h += `</div>`;
  }

  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════════════
   FILES PANEL
══════════════════════════════════════════════════════════ */
async function loadFiles() {
  const el = document.getElementById('panel-files');
  renderLoading(el);

  const uploadUrl = `https://github.com/${REPO}/upload/${BRANCH}/files`;
  let files = [];

  try {
    const r = await fetch(API + 'contents/files?_=' + Date.now());
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) files = data.filter(f => f.type === 'file');
    }
  } catch {}

  let h = `<div class="files-toolbar">
    <div>
      <div class="period-title" style="font-size:1.05rem;margin-bottom:4px">Файлы проекта</div>
      <div style="font-size:.8rem;color:var(--text-muted)">Хранятся в папке <code>files/</code> репозитория</div>
    </div>
    <a class="upload-btn" href="${uploadUrl}" target="_blank" rel="noopener">↑ Загрузить файл</a>
  </div>`;

  if (!files.length) {
    h += `<div class="empty-state">
      <span class="empty-icon">📁</span>
      <p>Файлов пока нет</p>
      <p style="margin-top:10px;font-size:.85rem">
        <a href="${uploadUrl}" target="_blank" rel="noopener">Загрузить первый файл →</a>
      </p>
      <p style="margin-top:6px;font-size:.77rem;color:var(--text-muted)">
        Поддерживаются любые форматы: видео, фото, PDF, архивы
      </p>
    </div>`;
  } else {
    h += `<div class="file-grid">`;
    for (const f of files) {
      h += `<div class="file-card">
        <div class="file-icon">${fileIcon(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-size">${f.size ? formatSize(f.size) : ''}</div>
        </div>
        <a class="file-dl" href="${f.download_url}" target="_blank" rel="noopener" download title="Скачать">↓</a>
      </div>`;
    }
    h += `</div>`;
  }

  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════════════
   LOAD ALL PERIODS
══════════════════════════════════════════════════════════ */
async function loadAll() {
  const now = new Date();
  document.getElementById('last-updated').innerHTML =
    `Последнее обновление: <strong>${now.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</strong>`;

  for (const [period, cfg] of Object.entries(PERIODS)) {
    const el  = document.getElementById(`panel-${period}`);
    const fn  = cfg.fn();
    renderLoading(el);
    const md = await fetchMd(fn);
    if (!md) { renderEmpty(el, period, fn); continue; }
    const tasks = parseMd(md, period);
    tasks.length ? renderPeriod(el, period, fn, tasks) : renderEmpty(el, period, fn);
  }

  // refresh team if visible
  if (document.getElementById('panel-team').classList.contains('active')) loadTeam();
}

/* ══════════════════════════════════════════════════════════
   CHECKBOX INTERACTION
══════════════════════════════════════════════════════════ */
document.getElementById('main-content').addEventListener('click', e => {
  const chk = e.target.closest('.task-check');
  if (!chk) return;
  const c = chk.closest('.task-card');
  if (!c) return;

  const key     = c.dataset.key;
  const isDone  = c.dataset.done === 'true';
  const nowDone = !isDone;

  toggleStored(key, isDone);

  c.dataset.done = nowDone;
  c.classList.toggle('done', nowDone);
  chk.classList.toggle('checked', nowDone);
  chk.setAttribute('aria-checked', nowDone);

  const txt = c.querySelector('.task-text');
  txt.style.textDecoration = nowDone ? 'line-through' : '';
  txt.style.color          = nowDone ? 'var(--text-muted)' : '';
});

// keyboard support
document.getElementById('main-content').addEventListener('keydown', e => {
  if (e.key !== ' ' && e.key !== 'Enter') return;
  if (!e.target.classList.contains('task-check')) return;
  e.preventDefault();
  e.target.click();
});

/* ══════════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════════ */
document.getElementById('tabs-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');

  if (tab === 'team')  loadTeam();
  if (tab === 'files') loadFiles();
});

    .replace(/&/g,'&amp;').replace(/</g,'&lt;')

  <script>

  /* ══ Прикреплённые ссылки (filmway-attachments v1) ════════════════════════ */
  const ATTACH_KEY = 'filmway-attachments';

  function loadAttachments() {
    try { return JSON.parse(localStorage.getItem(ATTACH_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveAttachments(data) {
    localStorage.setItem(ATTACH_KEY, JSON.stringify(data));
  }

  function renderLinks(taskKey, container) {
    const data = loadAttachments();
    const links = data[taskKey] || [];
    let linksEl = container.querySelector('.task-links');
    if (!linksEl) {
      linksEl = document.createElement('div');
      linksEl.className = 'task-links';
      container.appendChild(linksEl);
    }
    linksEl.innerHTML = links.map((l, i) => {
      const label = l.title || (l.url.length > 40 ? l.url.slice(0,37)+'…' : l.url);
      return `<a class="task-link-chip" href="${escHtml(l.url)}" target="_blank" rel="noopener">
        🔗 ${escHtml(label)}<span class="del-link" data-idx="${i}" data-key="${escHtml(taskKey)}" title="Удалить">×</span>
      </a>`;
    }).join('');
    linksEl.querySelectorAll('.del-link').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const d = loadAttachments();
        const k = btn.dataset.key;
        d[k] = (d[k] || []).filter((_, idx) => idx != btn.dataset.idx);
        saveAttachments(d);
        renderLinks(k, container);
      });
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addAttachButton(taskEl, taskKey) {
    if (taskEl.querySelector('.task-attach-btn')) return;

    // Кнопка 📎
    const btn = document.createElement('button');
    btn.className = 'task-attach-btn';
    btn.title = 'Прикрепить ссылку';
    btn.textContent = '📎';

    // Строка ввода
    const inputRow = document.createElement('div');
    inputRow.className = 'attach-input-row';
    inputRow.innerHTML = `
      <input type="url" placeholder="https://… или любая ссылка" />
      <button class="attach-save">Добавить</button>
      <button class="attach-cancel">✕</button>`;

    const input = inputRow.querySelector('input');
    const saveBtn = inputRow.querySelector('.attach-save');
    const cancelBtn = inputRow.querySelector('.attach-cancel');

    btn.addEventListener('click', () => {
      inputRow.classList.toggle('open');
      if (inputRow.classList.contains('open')) input.focus();
    });

    saveBtn.addEventListener('click', () => {
      const url = input.value.trim();
      if (!url) return;
      const data = loadAttachments();
      data[taskKey] = data[taskKey] || [];
      data[taskKey].push({ url, title: '' });
      saveAttachments(data);
      input.value = '';
      inputRow.classList.remove('open');
      renderLinks(taskKey, taskEl.parentElement || taskEl);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveBtn.click();
      if (e.key === 'Escape') cancelBtn.click();
    });

    cancelBtn.addEventListener('click', () => {
      input.value = '';
      inputRow.classList.remove('open');
    });

    // Вставляем кнопку и поле
    taskEl.appendChild(btn);
    const parent = taskEl.parentElement || taskEl.closest('li') || taskEl;
    parent.insertAdjacentElement('afterend', inputRow);

    renderLinks(taskKey, parent.parentElement || parent);
  }

  function initAttachments() {
    // Ищем все элементы задач: label внутри .task-item, или li с checkbox
    document.querySelectorAll('.task-item, li').forEach(item => {
      const label = item.querySelector('label') || item;
      const text = label.textContent.trim();
      if (!text || text.length < 3) return;
      // djb2 hash как ключ (тот же что используется для чекбоксов)
      let hash = 5381;
      for (let i = 0; i < text.length; i++) hash = ((hash << 5) + hash) ^ text.charCodeAt(i);
      const key = 'attach_' + (hash >>> 0).toString(36);
      addAttachButton(label, key);
    });
  }

  // Запускаем после рендера контента
  document.addEventListener('DOMContentLoaded', () => {
    // Если контент загружается динамически — наблюдаем за изменениями
    const target = document.getElementById('main-content') || document.body;
    const obs = new MutationObserver(() => initAttachments());
    obs.observe(target, { childList: true, subtree: true });
    initAttachments();
  });
  /* ══ end filmway-attachments ═══════════════════════════════════════════════ */
  </script>

  <script>

/* ══ Filmway Dashboard v2 ══════════════════════════════════════════════════ */

// ── Команда ──────────────────────────────────────────────────────────────────
const TEAM = [
  { name: 'Кирилл', key: 'кирилл', color: '#c5d0f0' },
  { name: 'Эрадж',  key: 'эрадж',  color: '#c8e6c9' },
  { name: 'Кира',   key: 'кира',   color: '#fce4ec' },
  { name: 'Ульяна', key: 'ульяна', color: '#f3e5f5' },
  { name: 'Катрина',key: 'катрина',color: '#fff3e0' },
  { name: 'Полина', key: 'полина', color: '#e0f7fa' },
  { name: 'Дима',   key: 'дима',   color: '#fff9c4' },
  { name: 'Даша',   key: 'даша',   color: '#fbe9e7' },
  { name: 'Лера',   key: 'лера',   color: '#ede7f6' },
];

let activeMemberFilter = null;

function buildSidebars() {
  // Левая панель — команда
  const left = document.getElementById('fw-sidebar-left');
  if (!left) return;
  left.innerHTML = '<div class="sidebar-title">👥 Команда</div>';
  const clearBtn = document.createElement('div');
  clearBtn.className = 'member-filter-clear';
  clearBtn.id = 'member-filter-clear';
  clearBtn.textContent = '✕ Показать всех';
  clearBtn.onclick = () => { activeMemberFilter = null; applyFilters(); updateTeamUI(); };
  left.appendChild(clearBtn);

  TEAM.forEach(m => {
    const el = document.createElement('div');
    el.className = 'team-member';
    el.dataset.key = m.key;
    const taskCount = countTasksForMember(m.key);
    el.innerHTML = `
      <div class="member-avatar" style="background:${m.color}">${m.name[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-tasks">${taskCount > 0 ? taskCount + ' задач' : 'нет задач'}</div>
      </div>`;
    el.onclick = () => {
      activeMemberFilter = activeMemberFilter === m.key ? null : m.key;
      applyFilters();
      updateTeamUI();
    };
    left.appendChild(el);
  });

  // Правая панель — действия
  const right = document.getElementById('fw-sidebar-right');
  if (!right) return;
  right.innerHTML = `
    <div class="sidebar-title">⚡ Быстро добавить</div>
    <div class="quick-add-form">
      <textarea id="quick-task-text" placeholder="Текст задачи…&#10;Можно с именем: — Кирилл"></textarea>
      <div class="quick-add-row">
        <select id="quick-task-period">
          <option value="day">Сегодня</option>
          <option value="week">Неделя</option>
          <option value="month">Месяц</option>
        </select>
        <button onclick="quickAddTask()">＋ Добавить</button>
      </div>
    </div>
    <div class="sidebar-title" style="margin-top:10px">🕐 Активность</div>
    <div class="activity-log" id="activity-log"></div>`;
  renderActivityLog();
}

function countTasksForMember(key) {
  let count = 0;
  document.querySelectorAll('.task-item, li').forEach(el => {
    if (el.textContent.toLowerCase().includes(key)) count++;
  });
  return count;
}

function updateTeamUI() {
  document.querySelectorAll('.team-member').forEach(el => {
    el.classList.toggle('active', el.dataset.key === activeMemberFilter);
  });
  const clearBtn = document.getElementById('member-filter-clear');
  if (clearBtn) clearBtn.classList.toggle('visible', !!activeMemberFilter);
}

// ── Фильтр / поиск ──────────────────────────────────────────────────────────
let searchQuery = '';

function applyFilters() {
  const q = searchQuery.toLowerCase();
  let visible = 0, total = 0;
  document.querySelectorAll('.task-item, li').forEach(el => {
    if (!el.querySelector('input[type=checkbox]') && !el.classList.contains('task-item')) return;
    const text = el.textContent.toLowerCase();
    total++;
    const matchSearch = !q || text.includes(q);
    const matchMember = !activeMemberFilter || text.includes(activeMemberFilter);
    const hide = !matchSearch || !matchMember;
    el.classList.toggle('task-hidden-by-search', hide);
    if (!hide) visible++;
  });
  const cnt = document.getElementById('fw-search-count');
  if (cnt) cnt.textContent = q || activeMemberFilter ? `${visible} из ${total}` : '';
}

function initSearch() {
  const inp = document.getElementById('fw-search-input');
  if (!inp) return;
  inp.addEventListener('input', () => {
    searchQuery = inp.value;
    applyFilters();
  });
}

// ── Редактирование задачи ────────────────────────────────────────────────────
const EDITS_KEY = 'fw-task-edits';
let isEditing = false;

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); }
  catch { return {}; }
}
function saveEdit(key, text) {
  const d = loadEdits(); d[key] = text; localStorage.setItem(EDITS_KEY, JSON.stringify(d));
  logActivity(`✏️ Задача отредактирована`);
}
function removeEdit(key) {
  const d = loadEdits(); delete d[key]; localStorage.setItem(EDITS_KEY, JSON.stringify(d));
}

function taskKey(text) {
  let h = 5381;
  for (let i = 0; i < text.length; i++) h = ((h << 5) + h) ^ text.charCodeAt(i);
  return 'edit_' + (h >>> 0).toString(36);
}

function initTaskEditing() {
  document.querySelectorAll('.task-item label, li label').forEach(label => {
    if (label.querySelector('.task-edit-btn')) return;
    const origText = label.textContent.trim();
    const key = taskKey(origText);
    const edits = loadEdits();

    // Применяем сохранённую правку
    if (edits[key] && edits[key] !== origText) {
      const badge = document.createElement('span');
      badge.className = 'task-edited-badge';
      badge.textContent = 'ред.';
      label.appendChild(badge);
    }

    // Кнопка редактирования
    const btn = document.createElement('button');
    btn.className = 'task-edit-btn';
    btn.title = 'Редактировать';
    btn.textContent = '✏️';
    btn.onclick = (e) => { e.stopPropagation(); startEdit(label, origText, key); };
    label.appendChild(btn);
  });
}

function startEdit(label, origText, key) {
  if (isEditing) return;
  isEditing = true;
  const edits = loadEdits();
  const currentText = edits[key] || origText;

  // Скрываем текущий текст, вставляем input
  label.querySelectorAll(':not(.task-edit-btn)').forEach(el => el.style.visibility = 'hidden');

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'task-edit-input';
  inp.value = currentText;

  const actions = document.createElement('div');
  actions.className = 'task-edit-actions visible';
  actions.innerHTML = '<button class="task-edit-save">💾 Сохранить</button><button class="task-edit-cancel">Отмена</button>';

  label.appendChild(inp);
  label.appendChild(actions);
  inp.focus(); inp.select();

  const finish = (save) => {
    isEditing = false;
    if (save && inp.value.trim() && inp.value.trim() !== origText) {
      saveEdit(key, inp.value.trim());
    }
    inp.remove(); actions.remove();
    label.querySelectorAll(':not(.task-edit-btn)').forEach(el => el.style.visibility = '');
    initTaskEditing();
  };

  actions.querySelector('.task-edit-save').onclick = () => finish(true);
  actions.querySelector('.task-edit-cancel').onclick = () => finish(false);
  inp.onkeydown = e => { if (e.key === 'Enter') finish(true); if (e.key === 'Escape') finish(false); };
}

// ── Быстрое добавление ───────────────────────────────────────────────────────
function quickAddTask() {
  const text = document.getElementById('quick-task-text')?.value.trim();
  if (!text) return;
  const pending = JSON.parse(localStorage.getItem('fw-pending-tasks') || '[]');
  pending.push({ text, period: document.getElementById('quick-task-period')?.value || 'day', ts: Date.now() });
  localStorage.setItem('fw-pending-tasks', JSON.stringify(pending));
  document.getElementById('quick-task-text').value = '';
  logActivity(`➕ Добавлена задача: ${text.slice(0,30)}${text.length>30?'…':''}`);
  renderActivityLog();
  alert('✅ Задача добавлена локально.\nЛера синхронизирует её с GitHub при следующем запросе.');
}

// ── Лог активности ───────────────────────────────────────────────────────────
function logActivity(msg) {
  const log = JSON.parse(localStorage.getItem('fw-activity') || '[]');
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  log.unshift({ msg, time, date: now.toLocaleDateString('ru') });
  if (log.length > 20) log.pop();
  localStorage.setItem('fw-activity', JSON.stringify(log));
}

function renderActivityLog() {
  const el = document.getElementById('activity-log');
  if (!el) return;
  const log = JSON.parse(localStorage.getItem('fw-activity') || '[]');
  if (!log.length) { el.innerHTML = '<div class="activity-item" style="color:#bbb">Нет активности</div>'; return; }
  el.innerHTML = log.slice(0,10).map(e =>
    `<div class="activity-item">${e.msg} <span class="act-time">${e.time}</span></div>`
  ).join('');
}

// ── Канбан ───────────────────────────────────────────────────────────────────
function buildKanban(rawContent) {
  const board = document.getElementById('kanban-board');
  if (!board) return;

  const cols = { progress: [], done: [], blocked: [] };
  const lines = (rawContent || '').split('\n');
  let curSection = null;

  lines.forEach(line => {
    if (/в процессе/i.test(line)) { curSection = 'progress'; return; }
    if (/выполнено/i.test(line)) { curSection = 'done'; return; }
    if (/не выполнено|заблокир/i.test(line)) { curSection = 'blocked'; return; }
    if (!curSection || !line.trim().startsWith('-')) return;

    const text = line.replace(/^[\s\-\[\]x]*/, '').trim();
    if (!text) return;

    const personMatch = text.match(/—\s*([\wА-яЁё]+)\s*(?:—|$)/i);
    const timeMatch = text.match(/(\d{1,2}:\d{2}[-–]\d{1,2}:\d{2})/);
    const cleanText = text.replace(/—\s*[\wА-яЁё]+\s*(?:—|$)/i,'').replace(/\d{1,2}:\d{2}[-–]\d{1,2}:\d{2}/,'').trim();

    cols[curSection].push({
      text: cleanText, person: personMatch?.[1] || '', time: timeMatch?.[1] || ''
    });
  });

  const labels = { progress: '🔄 В процессе', done: '✅ Выполнено', blocked: '❌ Не выполнено' };
  board.innerHTML = Object.entries(cols).map(([col, tasks]) => `
    <div class="kanban-col col-${col}">
      <div class="kanban-col-title">${labels[col]} <span style="opacity:.5;font-weight:400">(${tasks.length})</span></div>
      ${tasks.map(t => `
        <div class="kanban-card">
          ${t.text}
          ${t.person ? `<div class="kc-person">👤 ${t.person}</div>` : ''}
          ${t.time   ? `<span class="kc-time">🕐 ${t.time}</span>` : ''}
        </div>`).join('')}
      ${tasks.length === 0 ? '<div style="color:#bbb;font-size:12px;text-align:center;padding:12px 0">Нет задач</div>' : ''}
    </div>`).join('');
}

// ── Авто-обновление каждые 2 минуты ─────────────────────────────────────────
let lastRefresh = Date.now();
let refreshTimer = null;
const RAW_BASE = 'https://raw.githubusercontent.com/filmway-team-bot/filmway-tasks/main/';

function getDateStr(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}

function setRefreshStatus(loading) {
  const bar = document.getElementById('fw-refresh-bar');
  if (bar) bar.classList.toggle('refreshing', loading);
}

async function autoRefresh() {
  if (isEditing) return; // пауза при редактировании
  setRefreshStatus(true);
  try {
    const today = getDateStr();
    const r = await fetch(RAW_BASE + 'tasks/day/' + today + '.md?_=' + Date.now());
    if (r.ok) {
      const text = await r.text();
      const el = document.getElementById('main-content');
      if (el && window._lastRawContent !== text) {
        window._lastRawContent = text;
        // Только если есть активная вкладка задач — рендерим через существующую функцию
        if (typeof renderContent === 'function' && document.querySelector('[data-tab].active')) {
          const activeTab = document.querySelector('[data-tab].active')?.dataset?.tab;
          if (activeTab === 'day') renderContent(text, 'day');
        }
        buildKanban(text);
        buildSidebars();
        initTaskEditing();
        applyFilters();
      }
    }
  } catch(e) {}
  setRefreshStatus(false);
  const bar = document.getElementById('fw-refresh-time');
  if (bar) bar.textContent = 'обновлено ' + new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
}

// ── Сайдбар-тогглы ───────────────────────────────────────────────────────────
function toggleSidebar(side) {
  const el = document.getElementById('fw-sidebar-' + side);
  if (el) el.classList.toggle('collapsed');
}

// ── Инициализация ────────────────────────────────────────────────────────────
function fwInit() {
  buildSidebars();
  initSearch();
  initTaskEditing();
  applyFilters();

  // Авто-обновление каждые 2 минуты
  refreshTimer = setInterval(autoRefresh, 2 * 60 * 1000);
  // Первое обновление через 5 сек после загрузки
  setTimeout(autoRefresh, 5000);
}

document.addEventListener('DOMContentLoaded', fwInit);

// Перехватываем изменения контента (если основной JS перерисовывает задачи)
const _fwObserver = new MutationObserver(() => {
  initTaskEditing();
  applyFilters();
  buildSidebars();
});
document.addEventListener('DOMContentLoaded', () => {
  const target = document.getElementById('main-content') || document.body;
  _fwObserver.observe(target, { childList: true, subtree: true });
});

/* ══ end Filmway Dashboard v2 ═══════════════════════════════════════════════ */

  </script>
  <script>

  /* ── Search toggle v2 ──────────────────────────────────────────────────── */
  function initSearchToggle() {
    const btn = document.getElementById('fw-search-btn');
    const wrap = document.getElementById('fw-search-wrap');
    const inp  = document.getElementById('fw-search-input');
    if (!btn || !wrap || !inp) return;

    btn.addEventListener('click', () => {
      const isOpen = wrap.classList.toggle('open');
      btn.classList.toggle('active', isOpen);
      if (isOpen) { inp.focus(); }
      else { inp.value = ''; searchQuery = ''; applyFilters && applyFilters(); }
    });

    inp.addEventListener('keydown', e => {
      if (e.key === 'Escape') { btn.click(); }
    });

    // Глобальный shortcut: Cmd+F / Ctrl+F
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
        e.preventDefault();
        if (!wrap.classList.contains('open')) btn.click();
        else inp.focus();
      }
    });
  }
  document.addEventListener('DOMContentLoaded', initSearchToggle);
  /* ── end search toggle ──────────────────────────────────────────────────── */
  </script>
