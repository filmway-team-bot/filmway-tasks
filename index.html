<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmway AI — Task Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --card:        #1a1a2e;
      --accent:      #e94560;
      --accent2:     #c73652;
      --text:        #ffffff;
      --text-muted:  #8892a4;
      --done:        #2ecc71;
      --border:      rgba(233,69,96,.25);
      --shadow:      0 8px 32px rgba(0,0,0,.6);
      --radius:      12px;
      --time-color:  #4fc3f7;
      --time-bg:     rgba(79,195,247,.10);
      --time-border: rgba(79,195,247,.28);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      padding: 28px 32px 20px;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 60%, #0a0a0a 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px;
      flex-wrap: wrap;
    }

    .logo-wrap { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(233,69,96,.45);
      flex-shrink: 0;
    }

    h1 { font-size: clamp(1.2rem, 4vw, 1.75rem); font-weight: 700; letter-spacing: -.5px; line-height: 1.15; }
    h1 span { color: var(--accent); }

    .header-meta { margin-left: auto; text-align: right; font-size: .78rem; color: var(--text-muted); line-height: 1.6; }
    .header-meta strong { color: var(--text); }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs-bar {
      position: relative; z-index: 10;
      display: flex; gap: 4px;
      padding: 16px 32px 0;
      background: #0d0d1a;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 10px 22px;
      border: none; background: transparent;
      color: var(--text-muted);
      font-size: .9rem; font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
      transition: color .2s, background .2s;
      white-space: nowrap;
      position: relative;
    }

    .tab-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: var(--accent);
      transition: left .25s, right .25s;
      border-radius: 2px 2px 0 0;
    }

    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .tab-btn.active { color: var(--text); background: rgba(233,69,96,.08); }
    .tab-btn.active::after { left: 12px; right: 12px; }

    .tab-btn .badge {
      display: inline-block; margin-left: 6px;
      padding: 1px 7px; border-radius: 999px;
      font-size: .7rem; background: var(--accent); color: #fff;
      vertical-align: middle;
      opacity: 0; transform: scale(.7);
      transition: opacity .2s, transform .2s;
    }
    .tab-btn .badge.visible { opacity: 1; transform: scale(1); }

    /* ── Main ────────────────────────────────────────────── */
    main {
      position: relative; z-index: 5;
      padding: 28px 32px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp .35s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Period header ───────────────────────────────────── */
    .period-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 22px; flex-wrap: wrap;
    }

    .period-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    .period-date {
      font-size: .8rem; color: var(--accent);
      background: rgba(233,69,96,.1);
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid rgba(233,69,96,.3);
    }

    /* ── Progress bar ────────────────────────────────────── */
    .progress-wrap {
      background: rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 18px 22px; margin-bottom: 24px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }

    .progress-label { font-size: .85rem; color: var(--text-muted); min-width: 110px; }

    .progress-bar-outer {
      flex: 1; min-width: 120px; height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px; overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6b6b);
      border-radius: 999px;
      transition: width .7s cubic-bezier(.4,0,.2,1);
      width: 0%;
      box-shadow: 0 0 10px rgba(233,69,96,.5);
    }

    .progress-pct { font-size: 1rem; font-weight: 700; color: var(--text); min-width: 44px; text-align: right; }
    .progress-count { font-size: .8rem; color: var(--text-muted); }

    /* ── Task list ───────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Task card ───────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: cardIn .3s ease both;
      position: relative; overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      opacity: 0; transition: opacity .2s;
    }

    .task-card:hover { transform: translateX(3px); box-shadow: var(--shadow); border-color: rgba(233,69,96,.4); }
    .task-card:hover::before { opacity: 1; }
    .task-card.done { opacity: .65; }
    .task-card.done::before { background: var(--done); opacity: .6; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-card:nth-child(1)  { animation-delay: .02s; }
    .task-card:nth-child(2)  { animation-delay: .05s; }
    .task-card:nth-child(3)  { animation-delay: .08s; }
    .task-card:nth-child(4)  { animation-delay: .11s; }
    .task-card:nth-child(5)  { animation-delay: .14s; }
    .task-card:nth-child(6)  { animation-delay: .17s; }
    .task-card:nth-child(7)  { animation-delay: .20s; }
    .task-card:nth-child(8)  { animation-delay: .23s; }
    .task-card:nth-child(9)  { animation-delay: .26s; }
    .task-card:nth-child(10) { animation-delay: .29s; }

    /* ── Checkbox ────────────────────────────────────────── */
    .task-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 5px; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      cursor: pointer;
      user-select: none;
    }

    .task-check:hover { border-color: var(--done); background: rgba(46,204,113,.08); }

    .task-check.checked { background: var(--done); border-color: var(--done); }

    .task-check.checked::after {
      content: '';
      display: block; width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* ── Task body ───────────────────────────────────────── */
    .task-body { flex: 1; min-width: 0; }

    .task-text { font-size: .93rem; line-height: 1.5; word-break: break-word; transition: color .2s; }
    .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }

    .task-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    .meta-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .73rem; padding: 2px 9px;
      border-radius: 999px; font-weight: 600;
    }

    .chip-person   { background: rgba(233,69,96,.12); color: var(--accent); border: 1px solid rgba(233,69,96,.25); }
    .chip-deadline { background: rgba(255,190,11,.10); color: #ffbe0b;      border: 1px solid rgba(255,190,11,.25); }
    .chip-time     { background: var(--time-bg);       color: var(--time-color); border: 1px solid var(--time-border); }
    .chip-period   { background: rgba(139,92,246,.10); color: #a78bfa;      border: 1px solid rgba(139,92,246,.25); }

    /* ── Section heading ─────────────────────────────────── */
    .section-heading {
      font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted);
      margin: 18px 0 8px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }

    /* ── Person heading (Команда tab) ────────────────────── */
    .person-heading {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 10px;
      padding: 12px 16px;
      background: rgba(233,69,96,.06);
      border-radius: var(--radius);
      border: 1px solid rgba(233,69,96,.15);
    }

    .person-avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }

    .person-name { font-size: 1rem; font-weight: 700; }
    .person-count { margin-left: auto; font-size: .8rem; color: var(--text-muted); }

    /* ── Files panel ─────────────────────────────────────── */
    .files-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }

    .upload-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: .88rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .upload-btn:hover { background: var(--accent2); transform: translateY(-1px); }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: cardIn .3s ease both;
    }

    .file-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: rgba(233,69,96,.4); }

    .file-icon {
      font-size: 26px; flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05); border-radius: 8px;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: .88rem; font-weight: 600; word-break: break-all; margin-bottom: 4px; }
    .file-size { font-size: .74rem; color: var(--text-muted); }

    .file-dl {
      flex-shrink: 0;
      color: var(--accent);
      font-size: .8rem; font-weight: 600;
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid rgba(233,69,96,.3);
      border-radius: 6px;
      transition: background .2s;
    }
    .file-dl:hover { background: rgba(233,69,96,.1); }

    /* ── Empty / loading ─────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; display: block; }
    .empty-state p { font-size: .95rem; }
    .empty-state a { color: var(--accent); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 50px 20px;
      color: var(--text-muted); font-size: .9rem;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(233,69,96,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 16px;
      font-size: .75rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 18px 16px 14px; }
      .tabs-bar { padding: 12px 16px 0; }
      main { padding: 18px 16px 36px; }
      .tab-btn { padding: 8px 14px; font-size: .82rem; }
      .file-grid { grid-template-columns: 1fr; }
    }
  
    /* ── Лого ─────────────────────────────────── */
    .site-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 0 8px;
      background: var(--bg);
    }
    .site-logo {
      height: 52px;
      width: auto;
      display: block;
    }
    @media (prefers-color-scheme: dark) {
      .site-logo { filter: brightness(0.9); }
    }
  
    /* ── Прикреплённые ссылки к задачам ──────────────────────── */
    .task-attach-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; opacity: 0.4; padding: 0 2px;
      transition: opacity .15s; vertical-align: middle;
      line-height: 1;
    }
    .task-attach-btn:hover { opacity: 1; }
    .task-links {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin: 3px 0 2px 22px;
    }
    .task-link-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f0f4ff; border: 1px solid #c5d0f0;
      border-radius: 12px; padding: 2px 8px;
      font-size: 11px; color: #3355cc; text-decoration: none;
      max-width: 280px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-link-chip:hover { background: #dde6ff; }
    .task-link-chip .del-link {
      color: #999; cursor: pointer; font-size: 13px;
      line-height: 1; margin-left: 2px; flex-shrink: 0;
    }
    .task-link-chip .del-link:hover { color: #c00; }
    .attach-input-row {
      display: none; margin: 3px 0 4px 22px; gap: 4px;
    }
    .attach-input-row.open { display: flex; }
    .attach-input-row input {
      flex: 1; font-size: 12px; padding: 3px 7px;
      border: 1px solid #c5d0f0; border-radius: 8px; outline: none;
      min-width: 0;
    }
    .attach-input-row input:focus { border-color: #3355cc; }
    .attach-input-row button {
      font-size: 12px; padding: 3px 10px;
      background: #3355cc; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; white-space: nowrap;
    }
    .attach-input-row button:hover { background: #2244bb; }
    .attach-cancel { background: #eee !important; color: #555 !important; }
    .attach-cancel:hover { background: #ddd !important; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-wrap">
    <div class="logo-icon">🎬</div>
    <h1>Filmway AI — <span>Task Dashboard</span></h1>
  </div>
  <div class="header-meta">
    <div>Репозиторий: <strong>filmway-team-bot/filmway-tasks</strong></div>
    <div id="last-updated">Обновление…</div>
  </div>
</header>

<!-- Tabs -->
<div class="tabs-bar" id="tabs-bar">
  <button class="tab-btn active" data-tab="day">День <span class="badge" id="badge-day"></span></button>
  <button class="tab-btn" data-tab="week">Неделя <span class="badge" id="badge-week"></span></button>
  <button class="tab-btn" data-tab="month">Месяц <span class="badge" id="badge-month"></span></button>
  <button class="tab-btn" data-tab="halfyear">Полгода <span class="badge" id="badge-halfyear"></span></button>
  <button class="tab-btn" data-tab="year">Год <span class="badge" id="badge-year"></span></button>
  <button class="tab-btn" data-tab="team">Команда 👥</button>
  <button class="tab-btn" data-tab="files">Файлы 📁</button>
</div>

<!-- Panels -->
<main id="main-content">
  <div class="tab-panel active" id="panel-day"      data-period="day"></div>
  <div class="tab-panel"       id="panel-week"      data-period="week"></div>
  <div class="tab-panel"       id="panel-month"     data-period="month"></div>
  <div class="tab-panel"       id="panel-halfyear"  data-period="halfyear"></div>
  <div class="tab-panel"       id="panel-year"      data-period="year"></div>
  <div class="tab-panel"       id="panel-team"></div>
  <div class="tab-panel"       id="panel-files"></div>
</main>

<footer>
  Filmway AI © 2026 &nbsp;·&nbsp;
  <a href="https://github.com/filmway-team-bot/filmway-tasks" target="_blank" rel="noopener">GitHub</a>
  &nbsp;·&nbsp; Автообновление каждые 5 минут
</footer>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const REPO   = 'filmway-team-bot/filmway-tasks';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const API    = `https://api.github.com/repos/${REPO}/`;

const PERIODS = {
  day:      { label: 'День',    fn: () => `tasks/day/${todayStr()}.md` },
  week:     { label: 'Неделя',  fn: () => `tasks/week/${weekStr()}.md` },
  month:    { label: 'Месяц',   fn: () => `tasks/month/${monthStr()}.md` },
  halfyear: { label: 'Полгода', fn: () => `tasks/halfyear/${halfyearStr()}.md` },
  year:     { label: 'Год',     fn: () => `tasks/year/${yearStr()}.md` },
};

/* ══════════════════════════════════════════════════════════
   DATE HELPERS
══════════════════════════════════════════════════════════ */
const pad = n => String(n).padStart(2, '0');

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function weekStr() {
  const d = new Date(), jan1 = new Date(d.getFullYear(), 0, 1);
  const w = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${pad(w)}`;
}

function monthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function halfyearStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() < 6 ? 'H1' : 'H2'}`;
}

function yearStr() { return String(new Date().getFullYear()); }

function humanDate(s) {
  if (s.includes('-W')) return `Неделя ${s.split('-W')[1]}, ${s.split('-')[0]}`;
  if (s.includes('-H')) return s.replace('H1','первое полугодие').replace('H2','второе полугодие');
  if (/^\d{4}$/.test(s)) return s;
  if (/\d{4}-\d{2}-\d{2}/.test(s)) {
    const [y,m,dd] = s.split('-');
    const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    return `${+dd} ${mo[+m-1]} ${y}`;
  }
  if (/\d{4}-\d{2}/.test(s)) {
    const [y,m] = s.split('-');
    const mo = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    return `${mo[+m-1]} ${y}`;
  }
  return s;
}

function formatSize(b) {
  if (b < 1024)       return b + ' Б';
  if (b < 1048576)    return (b/1024).toFixed(1) + ' КБ';
  return (b/1048576).toFixed(1) + ' МБ';
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return { pdf:'📄',mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',webm:'🎬',
    mp3:'🎵',wav:'🎵',aac:'🎵',flac:'🎵',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',
    doc:'📝',docx:'📝',txt:'📝',md:'📝',
    xls:'📊',xlsx:'📊',csv:'📊',
    zip:'🗜️',rar:'🗜️','7z':'🗜️',
    ppt:'📋',pptx:'📋',
    ai:'🎨',psd:'🎨',fig:'🎨',sketch:'🎨',
  }[ext] || '📎';
}

/* ══════════════════════════════════════════════════════════
   LOCALSTORAGE — checkbox state
══════════════════════════════════════════════════════════ */
function taskKey(period, rawText) {
  const s = period + '|' + rawText.slice(0, 80);
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return 'fw_' + (h >>> 0).toString(36);
}

function storedDone(key, fallback) {
  const v = localStorage.getItem(key);
  return v === 'done' ? true : v === 'todo' ? false : fallback;
}

function toggleStored(key, currentDone) {
  localStorage.setItem(key, currentDone ? 'todo' : 'done');
}

/* ══════════════════════════════════════════════════════════
   FETCH
══════════════════════════════════════════════════════════ */
async function fetchMd(filename) {
  try {
    const r = await fetch(RAW + filename + '?_=' + Date.now());
    return r.ok ? r.text() : null;
  } catch { return null; }
}

/* ══════════════════════════════════════════════════════════
   PARSE MARKDOWN
══════════════════════════════════════════════════════════ */
function parseMd(md, period) {
  const items = [];
  let section = '';

  for (const raw of md.split('\n')) {
    const line = raw.trimEnd();

    if (/^#+\s/.test(line)) {
      section = line.replace(/^#+\s*/, '').trim();
      continue;
    }

    const mDone = line.match(/^[-*]\s+\[x\]\s+(.*)/i);
    const mTodo = line.match(/^[-*]\s+\[ \]\s+(.*)/);
    if (!mDone && !mTodo) continue;

    const origDone = !!mDone;
    const full     = (origDone ? mDone[1] : mTodo[1]).trim();

    // time range: 12:00-18:00 / 12:00–18:00
    const tMatch = full.match(/(\d{1,2}:\d{2})\s*[–\-—]\s*(\d{1,2}:\d{2})/);
    const timeRange = tMatch ? `${tMatch[1]}–${tMatch[2]}` : null;

    // person: — Имя or @handle
    const pMatch = full.match(/—\s*([А-ЯЁ][а-яё]+(?:\s+[А-ЯЁ][а-яё]+)?)/u)
                || full.match(/@([\w\d_]+)/);
    const person  = pMatch ? pMatch[0].replace(/^—\s*/, '').trim() : null;

    // deadline: до ДД.ММ
    const dMatch   = full.match(/до\s+(\d{1,2}\.\d{2}(?:\.\d{2,4})?)/);
    const deadline = dMatch ? dMatch[1] : null;

    // clean text
    let text = full
      .replace(/(\d{1,2}:\d{2})\s*[–\-—]\s*(\d{1,2}:\d{2})/, '')
      .replace(/—\s*[А-ЯЁ][а-яё]+(?:\s+[А-ЯЁ][а-яё]+)?/u, '')
      .replace(/@[\w\d_]+/, '')
      .replace(/до\s+\d{1,2}\.\d{2}(?:\.\d{2,4})?/, '')
      .replace(/\s{2,}/g, ' ').trim().replace(/^[-—]\s*/, '');
    if (!text) text = full;

    const key  = taskKey(period, full);
    const done = storedDone(key, origDone);

    items.push({ done, origDone, text, person, deadline, timeRange, section, key });
  }
  return items;
}

/* ══════════════════════════════════════════════════════════
   RENDER CARD
══════════════════════════════════════════════════════════ */
function card(task, extra = '') {
  const done = task.done;
  let meta = '';
  if (task.timeRange) meta += `<span class="meta-chip chip-time">⏰ ${esc(task.timeRange)}</span>`;
  if (task.person)    meta += `<span class="meta-chip chip-person">👤 ${esc(task.person)}</span>`;
  if (task.deadline)  meta += `<span class="meta-chip chip-deadline">📅 до ${esc(task.deadline)}</span>`;
  meta += extra;

  return `<div class="task-card${done?' done':''}" data-key="${esc(task.key)}" data-done="${done}">
    <div class="task-check${done?' checked':''}" role="checkbox" aria-checked="${done}" tabindex="0"></div>
    <div class="task-body">
      <div class="task-text">${esc(task.text)}</div>
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   RENDER PERIOD PANEL
══════════════════════════════════════════════════════════ */
function renderPeriod(el, period, filename, tasks) {
  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const fbase = filename.split('/').pop().replace('.md','');

  let h = `<div class="period-header">
    <span class="period-title">${PERIODS[period].label}</span>
    <span class="period-date">${humanDate(fbase)}</span>
  </div>`;

  if (total > 0) h += `<div class="progress-wrap">
    <span class="progress-label">Прогресс</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="pb-${period}"></div></div>
    <span class="progress-pct">${pct}%</span>
    <span class="progress-count">${done}/${total} выполнено</span>
  </div>`;

  h += `<div class="task-list">`;
  for (const sec of [...new Set(tasks.map(t => t.section))]) {
    if (sec) h += `<div class="section-heading">${esc(sec)}</div>`;
    tasks.filter(t => t.section === sec).forEach(t => { h += card(t); });
  }
  h += `</div>`;

  el.innerHTML = h;

  requestAnimationFrame(() => {
    const pb = document.getElementById(`pb-${period}`);
    if (pb) pb.style.width = pct + '%';
  });

  const badge = document.getElementById(`badge-${period}`);
  if (badge && total > 0) {
    badge.textContent = (total - done) || '✓';
    badge.classList.add('visible');
  }
}

function renderEmpty(el, period, filename) {
  const fbase = filename.split('/').pop();
  el.innerHTML = `<div class="period-header">
    <span class="period-title">${PERIODS[period].label}</span>
    <span class="period-date">${humanDate(fbase.replace('.md',''))}</span>
  </div>
  <div class="empty-state">
    <span class="empty-icon">📭</span>
    <p>Задач нет</p>
    <p style="margin-top:6px;font-size:.8rem">Файл <code>${filename}</code> не найден или пуст</p>
  </div>`;
}

function renderLoading(el) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div> Загрузка…</div>`;
}

/* ══════════════════════════════════════════════════════════
   TEAM PANEL
══════════════════════════════════════════════════════════ */
async function loadTeam() {
  const el = document.getElementById('panel-team');
  renderLoading(el);

  const periodsList = { day:'День', week:'Неделя', month:'Месяц' };
  const all = [];

  for (const [period, lbl] of Object.entries(periodsList)) {
    const md = await fetchMd(PERIODS[period].fn());
    if (!md) continue;
    parseMd(md, period).forEach(t => all.push({ ...t, periodLabel: lbl }));
  }

  if (!all.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">👥</span>
      <p>Нет задач с исполнителями</p>
      <p style="margin-top:6px;font-size:.8rem">Добавьте имена через «—» в файлах задач</p>
    </div>`;
    return;
  }

  const byPerson = {};
  const noPerson = [];
  for (const t of all) {
    t.person ? (byPerson[t.person] = byPerson[t.person] || [], byPerson[t.person].push(t))
             : noPerson.push(t);
  }

  let h = `<div class="period-header">
    <span class="period-title">Команда</span>
    <span class="period-date">День · Неделя · Месяц</span>
  </div>`;

  for (const [person, tasks] of Object.entries(byPerson)) {
    const ini = person.replace(/[@]/g,'').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
    const dc  = tasks.filter(t=>t.done).length;
    h += `<div class="person-heading">
      <div class="person-avatar">${ini||'?'}</div>
      <span class="person-name">${esc(person)}</span>
      <span class="person-count">${dc}/${tasks.length} выполнено</span>
    </div><div class="task-list">`;
    tasks.forEach(t => {
      h += card(t, `<span class="meta-chip chip-period">📅 ${esc(t.periodLabel)}</span>`);
    });
    h += `</div>`;
  }

  if (noPerson.length) {
    h += `<div class="person-heading" style="margin-top:28px">
      <div class="person-avatar">?</div>
      <span class="person-name">Без исполнителя</span>
      <span class="person-count">${noPerson.length} задач</span>
    </div><div class="task-list">`;
    noPerson.forEach(t => {
      h += card(t, `<span class="meta-chip chip-period">📅 ${esc(t.periodLabel)}</span>`);
    });
    h += `</div>`;
  }

  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════════════
   FILES PANEL
══════════════════════════════════════════════════════════ */
async function loadFiles() {
  const el = document.getElementById('panel-files');
  renderLoading(el);

  const uploadUrl = `https://github.com/${REPO}/upload/${BRANCH}/files`;
  let files = [];

  try {
    const r = await fetch(API + 'contents/files?_=' + Date.now());
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) files = data.filter(f => f.type === 'file');
    }
  } catch {}

  let h = `<div class="files-toolbar">
    <div>
      <div class="period-title" style="font-size:1.05rem;margin-bottom:4px">Файлы проекта</div>
      <div style="font-size:.8rem;color:var(--text-muted)">Хранятся в папке <code>files/</code> репозитория</div>
    </div>
    <a class="upload-btn" href="${uploadUrl}" target="_blank" rel="noopener">↑ Загрузить файл</a>
  </div>`;

  if (!files.length) {
    h += `<div class="empty-state">
      <span class="empty-icon">📁</span>
      <p>Файлов пока нет</p>
      <p style="margin-top:10px;font-size:.85rem">
        <a href="${uploadUrl}" target="_blank" rel="noopener">Загрузить первый файл →</a>
      </p>
      <p style="margin-top:6px;font-size:.77rem;color:var(--text-muted)">
        Поддерживаются любые форматы: видео, фото, PDF, архивы
      </p>
    </div>`;
  } else {
    h += `<div class="file-grid">`;
    for (const f of files) {
      h += `<div class="file-card">
        <div class="file-icon">${fileIcon(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-size">${f.size ? formatSize(f.size) : ''}</div>
        </div>
        <a class="file-dl" href="${f.download_url}" target="_blank" rel="noopener" download title="Скачать">↓</a>
      </div>`;
    }
    h += `</div>`;
  }

  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════════════
   LOAD ALL PERIODS
══════════════════════════════════════════════════════════ */
async function loadAll() {
  const now = new Date();
  document.getElementById('last-updated').innerHTML =
    `Последнее обновление: <strong>${now.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</strong>`;

  for (const [period, cfg] of Object.entries(PERIODS)) {
    const el  = document.getElementById(`panel-${period}`);
    const fn  = cfg.fn();
    renderLoading(el);
    const md = await fetchMd(fn);
    if (!md) { renderEmpty(el, period, fn); continue; }
    const tasks = parseMd(md, period);
    tasks.length ? renderPeriod(el, period, fn, tasks) : renderEmpty(el, period, fn);
  }

  // refresh team if visible
  if (document.getElementById('panel-team').classList.contains('active')) loadTeam();
}

/* ══════════════════════════════════════════════════════════
   CHECKBOX INTERACTION
══════════════════════════════════════════════════════════ */
document.getElementById('main-content').addEventListener('click', e => {
  const chk = e.target.closest('.task-check');
  if (!chk) return;
  const c = chk.closest('.task-card');
  if (!c) return;

  const key     = c.dataset.key;
  const isDone  = c.dataset.done === 'true';
  const nowDone = !isDone;

  toggleStored(key, isDone);

  c.dataset.done = nowDone;
  c.classList.toggle('done', nowDone);
  chk.classList.toggle('checked', nowDone);
  chk.setAttribute('aria-checked', nowDone);

  const txt = c.querySelector('.task-text');
  txt.style.textDecoration = nowDone ? 'line-through' : '';
  txt.style.color          = nowDone ? 'var(--text-muted)' : '';
});

// keyboard support
document.getElementById('main-content').addEventListener('keydown', e => {
  if (e.key !== ' ' && e.key !== 'Enter') return;
  if (!e.target.classList.contains('task-check')) return;
  e.preventDefault();
  e.target.click();
});

/* ══════════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════════ */
document.getElementById('tabs-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');

  if (tab === 'team')  loadTeam();
  if (tab === 'files') loadFiles();
});

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
  <script>

  /* ══ Прикреплённые ссылки (filmway-attachments v1) ════════════════════════ */
  const ATTACH_KEY = 'filmway-attachments';

  function loadAttachments() {
    try { return JSON.parse(localStorage.getItem(ATTACH_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveAttachments(data) {
    localStorage.setItem(ATTACH_KEY, JSON.stringify(data));
  }

  function renderLinks(taskKey, container) {
    const data = loadAttachments();
    const links = data[taskKey] || [];
    let linksEl = container.querySelector('.task-links');
    if (!linksEl) {
      linksEl = document.createElement('div');
      linksEl.className = 'task-links';
      container.appendChild(linksEl);
    }
    linksEl.innerHTML = links.map((l, i) => {
      const label = l.title || (l.url.length > 40 ? l.url.slice(0,37)+'…' : l.url);
      return `<a class="task-link-chip" href="${escHtml(l.url)}" target="_blank" rel="noopener">
        🔗 ${escHtml(label)}<span class="del-link" data-idx="${i}" data-key="${escHtml(taskKey)}" title="Удалить">×</span>
      </a>`;
    }).join('');
    linksEl.querySelectorAll('.del-link').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const d = loadAttachments();
        const k = btn.dataset.key;
        d[k] = (d[k] || []).filter((_, idx) => idx != btn.dataset.idx);
        saveAttachments(d);
        renderLinks(k, container);
      });
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addAttachButton(taskEl, taskKey) {
    if (taskEl.querySelector('.task-attach-btn')) return;

    // Кнопка 📎
    const btn = document.createElement('button');
    btn.className = 'task-attach-btn';
    btn.title = 'Прикрепить ссылку';
    btn.textContent = '📎';

    // Строка ввода
    const inputRow = document.createElement('div');
    inputRow.className = 'attach-input-row';
    inputRow.innerHTML = `
      <input type="url" placeholder="https://… или любая ссылка" />
      <button class="attach-save">Добавить</button>
      <button class="attach-cancel">✕</button>`;

    const input = inputRow.querySelector('input');
    const saveBtn = inputRow.querySelector('.attach-save');
    const cancelBtn = inputRow.querySelector('.attach-cancel');

    btn.addEventListener('click', () => {
      inputRow.classList.toggle('open');
      if (inputRow.classList.contains('open')) input.focus();
    });

    saveBtn.addEventListener('click', () => {
      const url = input.value.trim();
      if (!url) return;
      const data = loadAttachments();
      data[taskKey] = data[taskKey] || [];
      data[taskKey].push({ url, title: '' });
      saveAttachments(data);
      input.value = '';
      inputRow.classList.remove('open');
      renderLinks(taskKey, taskEl.parentElement || taskEl);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveBtn.click();
      if (e.key === 'Escape') cancelBtn.click();
    });

    cancelBtn.addEventListener('click', () => {
      input.value = '';
      inputRow.classList.remove('open');
    });

    // Вставляем кнопку и поле
    taskEl.appendChild(btn);
    const parent = taskEl.parentElement || taskEl.closest('li') || taskEl;
    parent.insertAdjacentElement('afterend', inputRow);

    renderLinks(taskKey, parent.parentElement || parent);
  }

  function initAttachments() {
    // Ищем все элементы задач: label внутри .task-item, или li с checkbox
    document.querySelectorAll('.task-item, li').forEach(item => {
      const label = item.querySelector('label') || item;
      const text = label.textContent.trim();
      if (!text || text.length < 3) return;
      // djb2 hash как ключ (тот же что используется для чекбоксов)
      let hash = 5381;
      for (let i = 0; i < text.length; i++) hash = ((hash << 5) + hash) ^ text.charCodeAt(i);
      const key = 'attach_' + (hash >>> 0).toString(36);
      addAttachButton(label, key);
    });
  }

  // Запускаем после рендера контента
  document.addEventListener('DOMContentLoaded', () => {
    // Если контент загружается динамически — наблюдаем за изменениями
    const target = document.getElementById('main-content') || document.body;
    const obs = new MutationObserver(() => initAttachments());
    obs.observe(target, { childList: true, subtree: true });
    initAttachments();
  });
  /* ══ end filmway-attachments ═══════════════════════════════════════════════ */
  </script>
</body>
