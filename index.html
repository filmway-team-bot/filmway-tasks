<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmway AI — Task Dashboard</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --card:      #1a1a2e;
      --card2:     #16213e;
      --accent:    #e94560;
      --accent2:   #c73652;
      --text:      #ffffff;
      --text-muted:#8892a4;
      --done:      #2ecc71;
      --border:    rgba(233,69,96,.25);
      --shadow:    0 8px 32px rgba(0,0,0,.6);
      --radius:    12px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      padding: 24px 32px 18px;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 60%, #0a0a0a 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(233,69,96,.45);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.2;
    }
    h1 span { color: var(--accent); }

    /* ── Search toggle ───────────────────────────────────────── */
    .header-right {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .search-toggle-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .search-toggle-btn:hover,
    .search-toggle-btn.active {
      background: rgba(233,69,96,.15);
      border-color: rgba(233,69,96,.4);
      color: var(--accent);
    }

    .search-slide {
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width .28s ease, opacity .2s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .search-slide.open {
      max-width: 300px;
      opacity: 1;
    }

    .search-input {
      width: 220px;
      padding: 7px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      color: var(--text);
      font-size: .85rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(233,69,96,.5); }

    .search-count {
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 48px;
    }

    .header-meta {
      font-size: .75rem;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: right;
      white-space: nowrap;
    }
    .header-meta strong { color: var(--text); }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tabs-bar {
      position: relative; z-index: 10;
      display: flex; gap: 4px;
      padding: 14px 32px 0;
      background: #0d0d1a;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 10px 22px;
      border: none; background: transparent;
      color: var(--text-muted);
      font-size: .88rem; font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
      transition: color .2s, background .2s;
      white-space: nowrap;
      position: relative;
    }
    .tab-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: var(--accent);
      transition: left .25s, right .25s;
      border-radius: 2px 2px 0 0;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .tab-btn.active {
      color: var(--text);
      background: rgba(233,69,96,.08);
    }
    .tab-btn.active::after { left: 12px; right: 12px; }

    .tab-btn .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: .68rem;
      background: var(--accent);
      color: #fff;
      vertical-align: middle;
      opacity: 0;
      transform: scale(.7);
      transition: opacity .2s, transform .2s;
    }
    .tab-btn .badge.visible { opacity: 1; transform: scale(1); }

    /* ── Main ────────────────────────────────────────────────── */
    main {
      position: relative; z-index: 5;
      padding: 28px 32px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp .3s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Period header ───────────────────────────────────────── */
    .period-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .period-title {
      font-size: 1rem; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .period-date {
      font-size: .78rem;
      color: var(--accent);
      background: rgba(233,69,96,.1);
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(233,69,96,.3);
    }

    /* ── Progress bar ────────────────────────────────────────── */
    .progress-wrap {
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .progress-label {
      font-size: .82rem; color: var(--text-muted); min-width: 100px;
    }
    .progress-bar-outer {
      flex: 1; min-width: 100px;
      height: 7px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6b6b);
      border-radius: 999px;
      transition: width .7s cubic-bezier(.4,0,.2,1);
      width: 0%;
      box-shadow: 0 0 10px rgba(233,69,96,.5);
    }
    .progress-pct {
      font-size: .95rem; font-weight: 700;
      color: var(--text); min-width: 42px; text-align: right;
    }
    .progress-count { font-size: .78rem; color: var(--text-muted); }

    /* ── Task list ───────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    /* ── Task card ───────────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      animation: cardIn .28s ease both;
      position: relative;
      overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity .18s;
    }
    .task-card:hover {
      transform: translateX(3px);
      box-shadow: var(--shadow);
      border-color: rgba(233,69,96,.35);
    }
    .task-card:hover::before { opacity: 1; }
    .task-card.done { opacity: .6; }
    .task-card.done::before { background: var(--done); opacity: .5; }

    /* Highlight search match */
    .task-card.search-match { border-color: rgba(233,69,96,.55); }
    .task-card.search-hidden { display: none !important; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .task-card:nth-child(1)  { animation-delay: .02s; }
    .task-card:nth-child(2)  { animation-delay: .05s; }
    .task-card:nth-child(3)  { animation-delay: .08s; }
    .task-card:nth-child(4)  { animation-delay: .11s; }
    .task-card:nth-child(5)  { animation-delay: .14s; }
    .task-card:nth-child(6)  { animation-delay: .17s; }
    .task-card:nth-child(7)  { animation-delay: .20s; }
    .task-card:nth-child(8)  { animation-delay: .23s; }
    .task-card:nth-child(9)  { animation-delay: .26s; }
    .task-card:nth-child(10) { animation-delay: .29s; }

    /* ── Checkbox ────────────────────────────────────────────── */
    .task-check {
      width: 19px; height: 19px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 5px;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s, border-color .18s;
      cursor: pointer;
    }
    .task-check.checked {
      background: var(--done);
      border-color: var(--done);
    }
    .task-check.checked::after {
      content: '';
      display: block;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* ── Task body ───────────────────────────────────────────── */
    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: .91rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }

    /* ── Pencil edit button ──────────────────────────────────── */
    .task-edit-btn {
      opacity: 0;
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, background .15s, color .15s, border-color .15s;
      margin-top: 1px;
    }
    .task-card:hover .task-edit-btn { opacity: 1; }
    .task-edit-btn:hover {
      background: rgba(233,69,96,.15);
      border-color: rgba(233,69,96,.35);
      color: var(--accent);
    }

    /* ── Inline edit input ───────────────────────────────────── */
    .task-edit-input {
      display: none;
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(233,69,96,.45);
      border-radius: 7px;
      padding: 5px 10px;
      color: var(--text);
      font-size: .91rem;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      resize: none;
    }
    .task-edit-input.active { display: block; }
    .task-edit-actions {
      display: none;
      gap: 5px;
      margin-top: 6px;
    }
    .task-edit-actions.active { display: flex; }
    .task-edit-save, .task-edit-cancel {
      font-size: .78rem;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      font-family: inherit;
    }
    .task-edit-save {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .task-edit-save:hover { background: var(--accent2); }
    .task-edit-cancel {
      background: rgba(255,255,255,.05); color: var(--text-muted);
      border-color: rgba(255,255,255,.1);
    }
    .task-edit-cancel:hover { background: rgba(255,255,255,.1); }

    /* ── Task meta chips ─────────────────────────────────────── */
    .task-meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 7px;
    }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .72rem;
      padding: 2px 9px;
      border-radius: 999px;
      font-weight: 600;
    }
    .chip-person {
      background: rgba(233,69,96,.12);
      color: var(--accent);
      border: 1px solid rgba(233,69,96,.25);
    }
    .chip-deadline {
      background: rgba(255,190,11,.1);
      color: #ffbe0b;
      border: 1px solid rgba(255,190,11,.25);
    }

    /* ── Search highlight mark ───────────────────────────────── */
    mark {
      background: rgba(233,69,96,.35);
      color: inherit;
      border-radius: 3px;
      padding: 0 1px;
    }

    /* ── Empty / loading ─────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 56px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 2.8rem; margin-bottom: 10px; opacity: .4; }
    .empty-state p { font-size: .92rem; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 50px 20px;
      color: var(--text-muted); font-size: .88rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(233,69,96,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section heading ─────────────────────────────────────── */
    .section-heading {
      font-size: .76rem; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin: 16px 0 7px;
      padding-left: 10px;
      border-left: 3px solid var(--accent);
    }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 14px;
      font-size: .73rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 16px 14px 14px; }
      .tabs-bar { padding: 10px 14px 0; }
      main { padding: 16px 14px 36px; }
      .tab-btn { padding: 8px 14px; font-size: .82rem; }
      .search-input { width: 160px; }
      .header-meta { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo-wrap">
    <div class="logo-icon">🎬</div>
    <h1>Filmway AI — <span>Task Dashboard</span></h1>
  </div>

  <div class="header-right">
    <!-- Поиск: кнопка + скрывающееся поле -->
    <div class="search-slide" id="search-slide">
      <input
        class="search-input"
        id="search-input"
        type="search"
        placeholder="Поиск задач…"
        autocomplete="off"
      />
      <span class="search-count" id="search-count"></span>
    </div>
    <button class="search-toggle-btn" id="search-toggle-btn" title="Поиск (⌘F)">🔍</button>

    <div class="header-meta" id="last-updated">Обновление…</div>
  </div>
</header>

<!-- ── Tabs ────────────────────────────────────────────────── -->
<div class="tabs-bar" id="tabs-bar">
  <button class="tab-btn active" data-tab="day">День <span class="badge" id="badge-day"></span></button>
  <button class="tab-btn" data-tab="week">Неделя <span class="badge" id="badge-week"></span></button>
  <button class="tab-btn" data-tab="month">Месяц <span class="badge" id="badge-month"></span></button>
  <button class="tab-btn" data-tab="halfyear">Полгода <span class="badge" id="badge-halfyear"></span></button>
  <button class="tab-btn" data-tab="year">Год <span class="badge" id="badge-year"></span></button>
</div>

<!-- ── Panels ──────────────────────────────────────────────── -->
<main>
  <div class="tab-panel active" id="panel-day"     data-period="day"></div>
  <div class="tab-panel"       id="panel-week"     data-period="week"></div>
  <div class="tab-panel"       id="panel-month"    data-period="month"></div>
  <div class="tab-panel"       id="panel-halfyear" data-period="halfyear"></div>
  <div class="tab-panel"       id="panel-year"     data-period="year"></div>
</main>

<footer>
  Filmway AI © 2026 &nbsp;·&nbsp;
  <a href="https://github.com/filmway-team-bot/filmway-tasks" target="_blank" rel="noopener">GitHub</a>
  &nbsp;·&nbsp; Автообновление каждые 5 минут
</footer>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const REPO   = 'filmway-team-bot/filmway-tasks';
const BRANCH = 'main';
const BASE   = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const EDITS_KEY = 'fw-task-edits';   // localStorage: {hash: editedText}

const PERIODS = {
  day:      { label: 'День',    getFilename: () => `tasks/day/${todayStr()}.md` },
  week:     { label: 'Неделя',  getFilename: () => `tasks/week/${weekStr()}.md` },
  month:    { label: 'Месяц',   getFilename: () => `tasks/month/${monthStr()}.md` },
  halfyear: { label: 'Полгода', getFilename: () => `tasks/halfyear/${halfyearStr()}.md` },
  year:     { label: 'Год',     getFilename: () => `tasks/year/${yearStr()}.md` },
};

// ══════════════════════════════════════════════════════════════
//  DATE HELPERS
// ══════════════════════════════════════════════════════════════
function pad(n) { return String(n).padStart(2, '0'); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function weekStr() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${pad(week)}`;
}
function monthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}
function halfyearStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() < 6 ? 'H1' : 'H2'}`;
}
function yearStr() { return String(new Date().getFullYear()); }

function humanDate(s) {
  if (s.includes('-W')) return `Неделя ${s.split('-W')[1]}, ${s.split('-')[0]}`;
  if (s.includes('-H')) return s.replace('H1','первое полугодие').replace('H2','второе полугодие');
  if (/^\d{4}$/.test(s)) return s;
  if (/\d{4}-\d{2}-\d{2}/.test(s)) {
    const [y,m,dd] = s.split('-');
    const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    return `${parseInt(dd,10)} ${months[parseInt(m,10)-1]} ${y}`;
  }
  if (/\d{4}-\d{2}/.test(s)) {
    const [y,m] = s.split('-');
    const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    return `${months[parseInt(m,10)-1]} ${y}`;
  }
  return s;
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// djb2 hash for stable task key
function djb2(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h<<5)+h) ^ str.charCodeAt(i);
  return (h>>>0).toString(36);
}

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); }
  catch { return {}; }
}
function saveEdits(e) { localStorage.setItem(EDITS_KEY, JSON.stringify(e)); }

// ══════════════════════════════════════════════════════════════
//  FETCH MARKDOWN
// ══════════════════════════════════════════════════════════════
async function fetchMarkdown(filename) {
  const res = await fetch(BASE + filename + `?_=${Date.now()}`);
  if (!res.ok) return null;
  return res.text();
}

// ══════════════════════════════════════════════════════════════
//  PARSE MARKDOWN
// ══════════════════════════════════════════════════════════════
function parseMarkdown(md) {
  const items  = [];
  let section  = '';
  for (const raw of md.split('\n')) {
    const line = raw.trimEnd();
    if (/^#+\s/.test(line)) {
      section = line.replace(/^#+\s*/, '').trim();
      continue;
    }
    const matchDone = line.match(/^[-*]\s+\[x\]\s+(.*)/i);
    const matchTodo = line.match(/^[-*]\s+\[ \]\s+(.*)/);
    if (!matchDone && !matchTodo) continue;

    const done = !!matchDone;
    const raw2 = (done ? matchDone[1] : matchTodo[1]).trim();

    let person = null;
    const pm = raw2.match(/—\s*([А-ЯЁа-яёA-Za-z][^\s,\(]*(?:\s+[А-ЯЁа-яёA-Za-z][^\s,\(]*)?)/u)
             || raw2.match(/@([\w\d_]+)/);
    if (pm) person = pm[0].replace(/^@/, '@');

    let deadline = null;
    const dl = raw2.match(/до\s+(\d{1,2}\.\d{2})/);
    if (dl) deadline = dl[1];

    const cleanText = raw2
      .replace(/—\s*[А-ЯЁа-яёA-Za-z][^\s,\(]*(?:\s+[А-ЯЁа-яёA-Za-z][^\s,\(]*)?/u, '')
      .replace(/@[\w\d_]+/, '')
      .replace(/до\s+\d{1,2}\.\d{2}/, '')
      .replace(/\s{2,}/g,' ').trim();

    items.push({ done, text: cleanText || raw2, rawText: raw2, person, deadline, section });
  }
  return items;
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function renderPanel(panelEl, period, filename, tasks) {
  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  const fileBase = filename.split('/').pop();

  let html = `
    <div class="period-header">
      <span class="period-title">${PERIODS[period].label}</span>
      <span class="period-date">${humanDate(fileBase.replace('.md',''))}</span>
    </div>`;

  if (total > 0) {
    html += `
    <div class="progress-wrap">
      <span class="progress-label">Прогресс</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="pb-${period}" style="width:0%"></div>
      </div>
      <span class="progress-pct">${pct}%</span>
      <span class="progress-count">${done}/${total} выполнено</span>
    </div>`;
  }

  html += `<div class="task-list" id="tl-${period}">`;
  const sections = [...new Set(tasks.map(t => t.section))];
  for (const sec of sections) {
    const group = tasks.filter(t => t.section === sec);
    if (sec) html += `<div class="section-heading">${escHtml(sec)}</div>`;
    for (const task of group) {
      html += renderCard(task);
    }
  }
  html += `</div>`;

  panelEl.innerHTML = html;
  requestAnimationFrame(() => {
    const pb = document.getElementById(`pb-${period}`);
    if (pb) pb.style.width = pct + '%';
  });

  const badge = document.getElementById(`badge-${period}`);
  if (badge && total > 0) {
    badge.textContent = total - done || '✓';
    badge.classList.add('visible');
  }

  // Attach edit handlers
  panelEl.querySelectorAll('.task-card').forEach(card => attachEdit(card));
}

function renderCard(task) {
  const edits   = loadEdits();
  const key     = djb2(task.rawText || task.text);
  const display = edits[key] || task.text;

  return `
  <div class="task-card${task.done ? ' done' : ''}" data-task-key="${key}">
    <div class="task-check${task.done ? ' checked' : ''}"></div>
    <div class="task-body">
      <div class="task-text">${escHtml(display)}</div>
      <textarea class="task-edit-input" rows="2">${escHtml(display)}</textarea>
      <div class="task-edit-actions">
        <button class="task-edit-save">Сохранить</button>
        <button class="task-edit-cancel">Отмена</button>
      </div>
      ${task.person || task.deadline ? `<div class="task-meta">
        ${task.person   ? `<span class="meta-chip chip-person">👤 ${escHtml(task.person)}</span>` : ''}
        ${task.deadline ? `<span class="meta-chip chip-deadline">📅 до ${escHtml(task.deadline)}</span>` : ''}
      </div>` : ''}
    </div>
    <button class="task-edit-btn" title="Редактировать">✏️</button>
  </div>`;
}

function renderEmpty(panelEl, period, filename) {
  const fileBase = filename.split('/').pop();
  panelEl.innerHTML = `
    <div class="period-header">
      <span class="period-title">${PERIODS[period].label}</span>
      <span class="period-date">${humanDate(fileBase.replace('.md',''))}</span>
    </div>
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>Задач нет</p>
      <p style="margin-top:6px;font-size:.78rem">Файл <code>${filename}</code> не найден или пуст</p>
    </div>`;
}

function renderLoading(panelEl) {
  panelEl.innerHTML = `<div class="loading"><div class="spinner"></div>Загрузка задач…</div>`;
}

// ══════════════════════════════════════════════════════════════
//  EDIT HANDLERS
// ══════════════════════════════════════════════════════════════
function attachEdit(card) {
  const editBtn    = card.querySelector('.task-edit-btn');
  const textEl     = card.querySelector('.task-text');
  const inputEl    = card.querySelector('.task-edit-input');
  const actionsEl  = card.querySelector('.task-edit-actions');
  const saveBtn    = card.querySelector('.task-edit-save');
  const cancelBtn  = card.querySelector('.task-edit-cancel');
  const key        = card.dataset.taskKey;

  if (!editBtn) return;

  function openEdit() {
    inputEl.value = textEl.textContent;
    textEl.style.display = 'none';
    inputEl.classList.add('active');
    actionsEl.classList.add('active');
    // Stop auto-refresh while editing
    window._editingTask = true;
    inputEl.focus();
    inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
  }

  function closeEdit() {
    textEl.style.display = '';
    inputEl.classList.remove('active');
    actionsEl.classList.remove('active');
    window._editingTask = false;
  }

  function saveEdit() {
    const newText = inputEl.value.trim();
    if (!newText) return;
    textEl.textContent = newText;
    const edits = loadEdits();
    edits[key] = newText;
    saveEdits(edits);
    closeEdit();
  }

  editBtn.addEventListener('click', e => { e.stopPropagation(); openEdit(); });
  saveBtn.addEventListener('click', e => { e.stopPropagation(); saveEdit(); });
  cancelBtn.addEventListener('click', e => { e.stopPropagation(); closeEdit(); });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
    if (e.key === 'Escape') closeEdit();
  });
}

// ══════════════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════════════
let searchQuery = '';

const searchToggleBtn = document.getElementById('search-toggle-btn');
const searchSlide     = document.getElementById('search-slide');
const searchInput     = document.getElementById('search-input');
const searchCount     = document.getElementById('search-count');

searchToggleBtn.addEventListener('click', () => {
  const isOpen = searchSlide.classList.toggle('open');
  searchToggleBtn.classList.toggle('active', isOpen);
  if (isOpen) {
    searchInput.focus();
  } else {
    searchInput.value = '';
    searchQuery = '';
    applySearch('');
  }
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  applySearch(searchQuery);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') searchToggleBtn.click();
});

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    if (!searchSlide.classList.contains('open')) {
      searchToggleBtn.click();
    } else {
      searchInput.focus();
    }
  }
});

function applySearch(q) {
  const cards = document.querySelectorAll('.task-card');
  let visible = 0;

  cards.forEach(card => {
    const textEl = card.querySelector('.task-text');
    if (!textEl) return;
    const text = textEl.textContent;

    if (!q) {
      card.classList.remove('search-hidden', 'search-match');
      textEl.innerHTML = escHtml(text);
      visible++;
      return;
    }

    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) {
      card.classList.add('search-hidden');
      card.classList.remove('search-match');
    } else {
      card.classList.remove('search-hidden');
      card.classList.add('search-match');
      // Highlight match
      const before = escHtml(text.slice(0, idx));
      const match  = escHtml(text.slice(idx, idx + q.length));
      const after  = escHtml(text.slice(idx + q.length));
      textEl.innerHTML = `${before}<mark>${match}</mark>${after}`;
      visible++;
    }
  });

  if (q) {
    searchCount.textContent = `${visible} из ${cards.length}`;
  } else {
    searchCount.textContent = '';
  }
}

// ══════════════════════════════════════════════════════════════
//  LOAD ALL PERIODS
// ══════════════════════════════════════════════════════════════
async function loadAll() {
  if (window._editingTask) return;   // don't refresh while editing

  const now = new Date();
  const timeStr = now.toLocaleString('ru-RU', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('last-updated').innerHTML =
    `Последнее обновление: <strong>${timeStr}</strong>`;

  for (const [period, cfg] of Object.entries(PERIODS)) {
    const panelEl  = document.getElementById(`panel-${period}`);
    const filename = cfg.getFilename();
    renderLoading(panelEl);
    const md = await fetchMarkdown(filename);
    if (!md) { renderEmpty(panelEl, period, filename); continue; }
    const tasks = parseMarkdown(md);
    if (tasks.length === 0) { renderEmpty(panelEl, period, filename); }
    else { renderPanel(panelEl, period, filename, tasks); }
  }

  // Re-apply search if open
  if (searchQuery) applySearch(searchQuery);
}

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
document.getElementById('tabs-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
});

// ══════════════════════════════════════════════════════════════
//  INIT + AUTO-REFRESH (every 5 min)
// ══════════════════════════════════════════════════════════════
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
