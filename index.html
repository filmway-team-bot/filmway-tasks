<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmway AI — Task Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #0a0a0a; --bg2:   #0d0d1a; --card:  #14142a;
      --acc:   #e94560; --a2:    #c73652;
      --text:  #f0f0f0; --muted: #7a8499;
      --done:  #2ecc71; --border:#1e1e3a; --b2:rgba(255,255,255,.07);
      --shad:  0 8px 28px rgba(0,0,0,.55); --r:11px;
    }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E"); background-size:180px; }

    /* ══ HEADER ══════════════════════════════════════════════════ */
    header { position:relative; z-index:20; background:linear-gradient(135deg,#0d0d1a 0%,#1a1a2e 60%,#0a0a0a 100%); border-bottom:1px solid rgba(233,69,96,.18); padding:15px 22px 12px; display:flex; align-items:center; gap:12px; }
    .logo-wrap { display:flex; align-items:center; gap:11px; flex:1; min-width:0; }
    .logo-icon { width:36px; height:36px; flex-shrink:0; border-radius:9px; background:linear-gradient(135deg,var(--acc),#ff6b6b); display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 14px rgba(233,69,96,.36); }
    h1 { font-size:clamp(.9rem,2.6vw,1.38rem); font-weight:700; letter-spacing:-.3px; }
    h1 span { color:var(--acc); }
    .hdr-right { display:flex; align-items:center; gap:7px; flex-shrink:0; }
    .search-slide { overflow:hidden; max-width:0; opacity:0; transition:max-width .28s ease,opacity .22s ease; display:flex; align-items:center; gap:6px; }
    .search-slide.open { max-width:250px; opacity:1; }
    .search-input { width:185px; padding:5px 12px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:15px; color:var(--text); font-size:.8rem; font-family:inherit; outline:none; transition:border-color .14s; }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:rgba(233,69,96,.46); }
    .search-count { font-size:.68rem; color:var(--muted); white-space:nowrap; min-width:44px; }
    .btn-icon { width:30px; height:30px; border-radius:7px; flex-shrink:0; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--muted); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .13s,border-color .13s,color .13s; }
    .btn-icon:hover,.btn-icon.on { background:rgba(233,69,96,.13); border-color:rgba(233,69,96,.34); color:var(--acc); }
    .hdr-meta { font-size:.68rem; color:var(--muted); text-align:right; white-space:nowrap; line-height:1.5; }
    .hdr-meta strong { color:var(--text); }

    /* ══ TEAM BAR ════════════════════════════════════════════════ */
    .team-bar { position:relative; z-index:15; background:var(--bg2); border-bottom:1px solid var(--b2); padding:8px 22px; display:flex; align-items:center; gap:5px; overflow-x:auto; scrollbar-width:none; }
    .team-bar::-webkit-scrollbar { display:none; }
    .team-label { font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); flex-shrink:0; margin-right:3px; }
    .member-chip { display:flex; align-items:center; gap:5px; padding:3px 9px 3px 4px; border-radius:18px; border:1px solid var(--b2); background:rgba(255,255,255,.04); cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .12s,border-color .12s; }
    .member-chip:hover { background:rgba(255,255,255,.07); }
    .member-chip.active { background:rgba(233,69,96,.11); border-color:rgba(233,69,96,.32); }
    .m-av { width:20px; height:20px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
    .m-name { font-size:11.5px; font-weight:600; }
    .m-cnt { font-size:9.5px; color:var(--muted); margin-left:1px; }
    .m-mtg { font-size:9px; background:rgba(91,157,245,.18); color:#89b4ff; border-radius:6px; padding:1px 5px; margin-left:1px; }
    .team-spacer { flex:1; }
    .filter-clear { font-size:9px; color:var(--acc); cursor:pointer; padding:2px 7px; border-radius:5px; border:1px solid rgba(233,69,96,.22); display:none; background:rgba(233,69,96,.05); }
    .filter-clear:hover { background:rgba(233,69,96,.12); }
    .filter-clear.show { display:block; }

    /* ══ ACTIONS PANEL ═══════════════════════════════════════════ */
    .actions-wrap { position:relative; z-index:14; overflow:hidden; max-height:0; transition:max-height .3s ease; background:rgba(8,8,20,.95); border-bottom:1px solid var(--b2); }
    .actions-wrap.open { max-height:160px; }
    .actions-bar { padding:11px 22px; display:flex; gap:20px; align-items:flex-start; }
    .qa-sec { flex:1; }
    .mini-title { font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:5px; }
    .qa-row { display:flex; gap:6px; }
    .qa-ta { flex:1; min-height:42px; resize:none; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:7px; padding:5px 8px; font-size:11.5px; font-family:inherit; color:var(--text); outline:none; }
    .qa-ta::placeholder { color:var(--muted); }
    .qa-ta:focus { border-color:rgba(233,69,96,.38); }
    .qa-ctrl { display:flex; flex-direction:column; gap:4px; }
    .qa-sel { font-size:10.5px; padding:3px 4px; background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--b2); border-radius:5px; font-family:inherit; }
    .qa-add { font-size:10.5px; padding:4px 9px; background:var(--acc); color:#fff; border:none; border-radius:5px; cursor:pointer; }
    .qa-add:hover { background:var(--a2); }
    .act-sec { width:190px; flex-shrink:0; }
    .act-scroll { max-height:100px; overflow-y:auto; }
    .act-item { font-size:10.5px; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--b2); line-height:1.3; }
    .act-time { color:rgba(255,255,255,.2); margin-left:3px; font-size:9.5px; }

    /* ══ TOPBAR ══════════════════════════════════════════════════ */
    .topbar { position:relative; z-index:13; background:var(--bg2); border-bottom:1px solid var(--b2); display:flex; align-items:center; gap:7px; padding:4px 22px; }
    .tb-btn { font-size:10.5px; padding:3px 9px; background:rgba(255,255,255,.04); border:1px solid var(--b2); border-radius:5px; color:var(--muted); cursor:pointer; transition:background .12s,color .12s; }
    .tb-btn:hover { background:rgba(233,69,96,.09); color:var(--text); }
    .tb-btn.on { background:rgba(233,69,96,.1); color:var(--acc); border-color:rgba(233,69,96,.26); }
    .tb-spacer { flex:1; }
    .ref-row { display:flex; align-items:center; gap:4px; font-size:9.5px; color:var(--muted); }
    .rdot { width:5px; height:5px; border-radius:50%; background:var(--done); animation:pdot 2.5s infinite; }
    @keyframes pdot{0%,100%{opacity:1}50%{opacity:.2}}
    .refreshing .rdot { background:#ff9800; }

    /* ══ TABS ════════════════════════════════════════════════════ */
    .tabs-bar { position:relative; z-index:10; background:var(--bg2); border-bottom:1px solid var(--b2); display:flex; gap:2px; padding:7px 22px 0; overflow-x:auto; scrollbar-width:none; }
    .tabs-bar::-webkit-scrollbar { display:none; }
    .tab-btn { padding:7px 16px; border:none; background:transparent; color:var(--muted); font-size:.83rem; font-weight:600; cursor:pointer; border-radius:var(--r) var(--r) 0 0; transition:color .15s,background .15s; white-space:nowrap; position:relative; }
    .tab-btn::after { content:''; position:absolute; bottom:0; left:50%; right:50%; height:2px; background:var(--acc); transition:left .2s,right .2s; border-radius:2px 2px 0 0; }
    .tab-btn:hover { color:var(--text); background:rgba(255,255,255,.04); }
    .tab-btn.active { color:var(--text); background:rgba(233,69,96,.07); }
    .tab-btn.active::after { left:9px; right:9px; }
    .tab-badge { display:inline-block; margin-left:4px; padding:1px 5px; border-radius:999px; font-size:.62rem; background:var(--acc); color:#fff; vertical-align:middle; opacity:0; transform:scale(.7); transition:opacity .17s,transform .17s; }
    .tab-badge.show { opacity:1; transform:scale(1); }

    /* ══ MAIN ════════════════════════════════════════════════════ */
    main { padding:18px 22px 48px; max-width:1060px; margin:0 auto; position:relative; z-index:5; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; animation:fup .24s ease both; }
    @keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .period-hdr { display:flex; align-items:center; gap:9px; margin-bottom:14px; flex-wrap:wrap; }
    .period-title { font-size:.85rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.3px; }
    .period-date { font-size:.7rem; color:var(--acc); background:rgba(233,69,96,.09); padding:2px 8px; border-radius:999px; border:1px solid rgba(233,69,96,.24); }

    .prog-wrap { background:rgba(255,255,255,.04); border-radius:var(--r); padding:11px 16px; margin-bottom:16px; border:1px solid var(--border); display:flex; align-items:center; gap:11px; flex-wrap:wrap; }
    .prog-label { font-size:.73rem; color:var(--muted); min-width:75px; }
    .prog-outer { flex:1; min-width:75px; height:5px; background:rgba(255,255,255,.07); border-radius:999px; overflow:hidden; }
    .prog-inner { height:100%; background:linear-gradient(90deg,var(--acc),#ff6b6b); border-radius:999px; transition:width .55s cubic-bezier(.4,0,.2,1); width:0%; box-shadow:0 0 6px rgba(233,69,96,.38); }
    .prog-pct { font-size:.85rem; font-weight:700; min-width:34px; text-align:right; }
    .prog-cnt { font-size:.7rem; color:var(--muted); }

    .task-list { display:flex; flex-direction:column; gap:6px; }
    .sec-heading { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin:12px 0 5px; padding-left:8px; border-left:3px solid var(--acc); }

    /* ══ TASK CARD ═══════════════════════════════════════════════ */
    .task-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; display:flex; align-items:flex-start; gap:9px; transition:transform .14s,box-shadow .14s,border-color .14s; animation:cin .22s ease both; position:relative; overflow:hidden; }
    .task-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--acc); opacity:0; transition:opacity .14s; }
    .task-card:hover { transform:translateX(3px); box-shadow:var(--shad); border-color:rgba(233,69,96,.28); }
    .task-card:hover::before { opacity:1; }
    .task-card.done { opacity:.54; }
    .task-card.done::before { background:var(--done); opacity:.38; }
    .task-card.found { border-color:rgba(233,69,96,.42); }
    .task-card.h-search,.task-card.h-member { display:none!important; }
    @keyframes cin{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    .task-card:nth-child(1){animation-delay:.02s}.task-card:nth-child(2){animation-delay:.04s}
    .task-card:nth-child(3){animation-delay:.06s}.task-card:nth-child(4){animation-delay:.08s}
    .task-card:nth-child(5){animation-delay:.10s}.task-card:nth-child(6){animation-delay:.12s}
    .task-card:nth-child(7){animation-delay:.14s}.task-card:nth-child(8){animation-delay:.16s}

    .task-check { width:16px; height:16px; flex-shrink:0; border-radius:4px; border:2px solid rgba(255,255,255,.13); margin-top:2px; display:flex; align-items:center; justify-content:center; transition:background .13s,border-color .13s; cursor:pointer; }
    .task-check.checked { background:var(--done); border-color:var(--done); }
    .task-check.checked::after { content:''; display:block; width:3px; height:7px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translate(-1px,-1px); }
    .task-body { flex:1; min-width:0; }
    .task-text { font-size:.86rem; line-height:1.48; word-break:break-word; }
    .task-card.done .task-text { text-decoration:line-through; color:var(--muted); }
    mark { background:rgba(233,69,96,.28); color:inherit; border-radius:3px; padding:0 1px; }
    .task-meta { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; align-items:center; }
    .chip { display:inline-flex; align-items:center; gap:3px; font-size:.67rem; padding:2px 7px; border-radius:999px; font-weight:600; }
    .cp { background:rgba(233,69,96,.1); color:var(--acc); border:1px solid rgba(233,69,96,.2); }
    .ct { background:rgba(255,190,11,.09); color:#ffbe0b; border:1px solid rgba(255,190,11,.2); }
    .cd { background:rgba(80,180,80,.09); color:#5db867; border:1px solid rgba(80,180,80,.18); }
    .edit-btn { opacity:0; flex-shrink:0; width:24px; height:24px; border-radius:5px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.03); color:var(--muted); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .11s,background .11s; margin-top:1px; }
    .task-card:hover .edit-btn { opacity:1; }
    .edit-btn:hover { background:rgba(233,69,96,.12); border-color:rgba(233,69,96,.28); color:var(--acc); }
    .edit-area { display:none; width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(233,69,96,.36); border-radius:6px; padding:5px 8px; color:var(--text); font-size:.86rem; font-family:inherit; line-height:1.45; outline:none; resize:none; }
    .edit-area.open { display:block; }
    .edit-btns { display:none; gap:4px; margin-top:4px; }
    .edit-btns.open { display:flex; }
    .btn-save,.btn-cancel { font-size:.7rem; padding:3px 9px; border-radius:5px; border:1px solid; cursor:pointer; font-family:inherit; }
    .btn-save { background:var(--acc); color:#fff; border-color:var(--acc); }
    .btn-save:hover { background:var(--a2); }
    .btn-cancel { background:rgba(255,255,255,.05); color:var(--muted); border-color:rgba(255,255,255,.1); }
    .attach-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .file-chip { display:inline-flex; align-items:center; gap:3px; font-size:.66rem; padding:2px 6px 2px 4px; background:rgba(80,130,220,.1); border:1px solid rgba(80,130,220,.24); border-radius:999px; color:#7aacff; text-decoration:none; max-width:190px; }
    .file-chip:hover { background:rgba(80,130,220,.17); }
    .fcn { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:120px; }
    .fcd { color:rgba(255,255,255,.28); cursor:pointer; font-size:12px; line-height:1; flex-shrink:0; transition:color .11s; }
    .fcd:hover { color:var(--acc); }
    .attach-btn { display:inline-flex; align-items:center; gap:3px; font-size:.66rem; padding:2px 6px; background:rgba(255,255,255,.04); border:1px dashed rgba(255,255,255,.13); border-radius:999px; color:var(--muted); cursor:pointer; transition:background .11s,border-color .11s,color .11s; }
    .attach-btn:hover { background:rgba(80,130,220,.09); border-color:rgba(80,130,220,.28); color:#7aacff; }
    input.file-input { display:none; }

    /* ══ EMPTY / LOADING ═════════════════════════════════════════ */
    .empty { text-align:center; padding:44px 20px; color:var(--muted); }
    .empty-icon { font-size:2.2rem; margin-bottom:8px; opacity:.36; }
    .loading { display:flex; align-items:center; justify-content:center; gap:10px; padding:40px 20px; color:var(--muted); font-size:.82rem; }
    .spinner { width:17px; height:17px; border:3px solid rgba(233,69,96,.14); border-top-color:var(--acc); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ══ WEEK CHIPS ══════════════════════════════════════════════ */
    .wk-chip { display:flex; align-items:center; gap:5px; font-size:9.5px; padding:3px 6px 3px 5px; border-radius:5px; cursor:pointer; background:rgba(255,255,255,.04); border:1px solid var(--b2); margin-bottom:3px; line-height:1.35; transition:background .1s,border-color .1s; }
    .wk-chip:hover { background:rgba(255,255,255,.09); border-color:rgba(255,255,255,.15); }
    .wk-chip.wk-done { opacity:.5; }
    .wk-chip.wk-done .wk-chip-text { text-decoration:line-through; color:var(--muted); }
    .wk-chip-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.25); flex-shrink:0; margin-top:1px; }
    .wk-chip.wk-done .wk-chip-dot { background:var(--done); }
    .wk-chip.wk-conflict .wk-chip-dot { background:var(--acc); }
    .wk-chip-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); flex:1; min-width:0; }
    .wk-chip-time { font-size:8.5px; color:var(--muted); flex-shrink:0; }
    .wk-task-detail { background:rgba(255,255,255,.05); border:1px solid rgba(233,69,96,.2); border-radius:6px; padding:7px 8px 6px; margin-bottom:4px; animation:fup .15s ease; }
    .wk-td-text { font-weight:600; font-size:10.5px; margin-bottom:4px; color:var(--text); line-height:1.4; }
    .wk-td-meta { color:var(--muted); font-size:9px; display:flex; flex-wrap:wrap; gap:4px; }
    .wk-td-tag { background:rgba(255,255,255,.07); border-radius:4px; padding:1px 5px; }

    /* ══ FILES TAB ═══════════════════════════════════════════════ */
    #panel-files { padding-top:4px; }
    .files-layout { display:flex; gap:16px; align-items:flex-start; }

    /* Projects sidebar */
    .projects-panel { width:200px; flex-shrink:0; background:rgba(255,255,255,.03); border:1px solid var(--b2); border-radius:var(--r); padding:10px; }
    .proj-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--b2); display:flex; align-items:center; justify-content:space-between; }
    .proj-add-btn { font-size:14px; cursor:pointer; color:var(--muted); transition:color .12s; line-height:1; }
    .proj-add-btn:hover { color:var(--acc); }

    .proj-item { display:flex; align-items:center; gap:7px; padding:5px 6px; border-radius:7px; cursor:pointer; transition:background .11s; margin-bottom:2px; }
    .proj-item:hover { background:rgba(255,255,255,.05); }
    .proj-item.active { background:rgba(233,69,96,.1); }
    .proj-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .proj-name { font-size:12px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .proj-fc { font-size:10px; color:var(--muted); }
    .proj-del { font-size:12px; color:rgba(255,255,255,.2); cursor:pointer; opacity:0; transition:opacity .11s,color .11s; }
    .proj-item:hover .proj-del { opacity:1; }
    .proj-del:hover { color:var(--acc); }

    .proj-add-form { display:none; padding:6px 0; }
    .proj-add-form.open { display:block; }
    .proj-add-inp { width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(233,69,96,.36); border-radius:6px; padding:5px 8px; font-size:11.5px; font-family:inherit; color:var(--text); outline:none; }
    .proj-colors { display:flex; gap:4px; flex-wrap:wrap; margin:5px 0; }
    .proj-color-swatch { width:16px; height:16px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s,border-color .1s; }
    .proj-color-swatch.selected { border-color:#fff; transform:scale(1.2); }
    .paf-btns { display:flex; gap:4px; }
    .paf-btns button { font-size:10.5px; padding:3px 8px; border-radius:5px; border:1px solid; cursor:pointer; font-family:inherit; }
    .paf-save { background:var(--acc); color:#fff; border-color:var(--acc); }
    .paf-cancel { background:rgba(255,255,255,.05); color:var(--muted); border-color:rgba(255,255,255,.1); }

    /* Files area */
    .files-area { flex:1; min-width:0; }
    .files-area-hdr { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .files-area-title { font-size:1rem; font-weight:700; }
    .files-upload-btn { display:inline-flex; align-items:center; gap:4px; font-size:12px; padding:5px 13px; background:var(--acc); color:#fff; border:none; border-radius:7px; cursor:pointer; margin-left:auto; transition:background .12s; }
    .files-upload-btn:hover { background:var(--a2); }
    .files-count { font-size:11px; color:var(--muted); }
    .files-storage { font-size:10px; color:var(--muted); }

    .files-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }

    /* ── Кнопка Sync ────────────────────────────────────── */
    #sync-btn {

    @keyframes spin-slow { to { transform: rotate(360deg); } }
    #sync-spin { display:inline-block; }

  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS & STORAGE
// ═══════════════════════════════════════════════════════════════
const REPO  = 'filmway-team-bot/filmway-tasks';
const BASE  = `https://raw.githubusercontent.com/${REPO}/main/`;
const K_EDITS = 'fw-edits';
const K_FILES = 'fw-files';      // task attachments {taskKey:[{name,dataUrl,size}]}
const K_PROJ  = 'fw-projects';   // [{id,name,color}]
const K_PFILES= 'fw-pfiles';     // project files [{id,name,dataUrl,size,projId,date,type}]
const K_ACT   = 'fw-act';
const K_CHECKS= 'fw-checks';    // manual checkbox overrides {taskKey: bool}

const PERIODS = {
  day:      { label:'День',    fn:()=>`tasks/day/${tdStr()}.md` },
  week:     { label:'Неделя',  fn:()=>`tasks/week/${wkStr()}.md` },
  month:    { label:'Месяц',   fn:()=>`tasks/month/${moStr()}.md` },
  halfyear: { label:'Полгода', fn:()=>`tasks/halfyear/${hyStr()}.md` },
  year:     { label:'Год',     fn:()=>`tasks/year/${yrStr()}.md` },
};

// Производственный календарь РФ 2026 — официальные нерабочие праздничные дни
const RU_HOLIDAYS_2026 = new Set([
  // Новогодние каникулы (1–8 января)
  '2026-01-01','2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08',
  // День защитника Отечества
  '2026-02-23',
  // Международный женский день (8 марта — вс, перенос на 9 марта — пн)
  '2026-03-09',
  // Праздник Весны и Труда
  '2026-05-01',
  // мостовые дни у длинных майских выходных
  '2026-05-04',
  // День Победы (9 мая — сб, перенос на 11 мая — пн)
  '2026-05-11',
  // День России
  '2026-06-12',
  // День народного единства
  '2026-11-04',
]);
// Вспомогательная функция
function isOffDay(dateStr){
  if(RU_HOLIDAYS_2026.has(dateStr))return'holiday';
  const dow=new Date(dateStr).getDay(); // 0=Sun,6=Sat
  if(dow===0||dow===6)return'weekend';
  return null;
}
let _weekDayTasks={};       // задачи из day-файлов для каждой даты текущей недели
let _allMeetingsByDate={};  // все загруженные встречи {dateStr: []} для тим-бара

const TEAM = [
  {name:'Кирилл',k:'кирилл',bg:'#2a2e50',tx:'#8899ee'},
  {name:'Эрадж',k:'эрадж',bg:'#1e3028',tx:'#5ecc80'},
  {name:'Кира',k:'кира',bg:'#301828',tx:'#ee6080'},
  {name:'Ульяна',k:'ульяна',bg:'#24203a',tx:'#9980ee'},

const pad=n=>String(n).padStart(2,'0');
function tdStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
// Возвращает массив из 7 дат (Пн–Вс) текущей недели
function weekDates(){const d=new Date(),dow=(d.getDay()+6)%7,mon=new Date(d);mon.setDate(d.getDate()-dow);return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return`${dd.getFullYear()}-${pad(dd.getMonth()+1)}-${pad(dd.getDate())}`;});}
function wkStr(){const d=new Date(),j=new Date(d.getFullYear(),0,1),w=Math.ceil(((d-j)/864e5+j.getDay()+1)/7);return`${d.getFullYear()}-W${pad(w)}`;}
function moStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}`;}
function hyStr(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()<6?'H1':'H2'}`;}
function yrStr(){return String(new Date().getFullYear());}
function nowT(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function fmtDate(ts){return new Date(ts).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function fmtSize(b){if(b<1024)return b+'B';if(b<1024*1024)return(b/1024).toFixed(1)+'KB';return(b/1024/1024).toFixed(1)+'MB';}
function humanDate(s){
  if(s.includes('-W'))return`Неделя ${s.split('-W')[1]}, ${s.split('-')[0]}`;
  if(s.includes('-H'))return s.replace('H1','I полугодие').replace('H2','II полугодие');
  if(/^\d{4}$/.test(s))return s;
  if(/\d{4}-\d{2}-\d{2}/.test(s)){const[y,m,dd]=s.split('-'),mn=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];return`${+dd} ${mn[+m-1]} ${y}`;}
  if(/\d{4}-\d{2}/.test(s)){const[y,m]=s.split('-'),mn=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];return`${mn[+m-1]} ${y}`;}
  return s;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function djb2(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36);}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fileIcon(name){

  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';

async function fetchMd(file){try{const r=await fetch(BASE+file+'?_='+Date.now());return r.ok?r.text():null;}catch{return null;}}

function parseMd(md){
  const items=[];let section='';
  for(const raw of md.split('\n')){
    const line=raw.trimEnd();
    if(/^#+\s/.test(line)){section=line.replace(/^#+\s*/,'').trim();continue;}
    const mD=line.match(/^[-*]\s+\[x\]\s+(.*)/i);
    const mT=line.match(/^[-*]\s+\[ \]\s+(.*)/);
    if(!mD&&!mT)continue;
    const done=!!mD;const raw2=(done?mD[1]:mT[1]).trim();
    const timeM=raw2.match(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/);
    const timeRange=timeM?`${timeM[1]}–${timeM[2]}`:null;
    // Multiple persons: "— Кирилл, Эрадж" / "— Кирилл / Эрадж" / "@mention"
    const personsArr=[];
    const pmAll=[...raw2.matchAll(/—\s*([А-ЯЁа-яё][а-яёА-ЯЁ]+(?:[,\/]\s*[А-ЯЁа-яё][а-яёА-ЯЁ]+)*)/gu)];
    pmAll.forEach(m=>m[1].split(/[,\/]/).forEach(p=>{const tr=p.trim();if(tr)personsArr.push(tr);}));
    [...raw2.matchAll(/@([\w\d_]+)/g)].forEach(m=>personsArr.push(m[1]));
    const persons=[...new Set(personsArr)];
    const person=persons[0]||null;
    const dlM=raw2.match(/до\s+(\d{1,2}\.\d{2}(?:\.\d{2,4})?)/);
    const deadline=dlM?dlM[1]:null;
    const clean=raw2.replace(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/g,'').replace(/—\s*[А-ЯЁа-яё][а-яёА-ЯЁ]+(?:[,\/]\s*[А-ЯЁа-яё][а-яёА-ЯЁ]+)*/gu,'').replace(/@[\w\d_]+/g,'').replace(/до\s+\d{1,2}\.\d{2}(?:\.\d{2,4})?/g,'').replace(/\s{2,}/g,' ').trim();
    items.push({done,text:clean||raw2,rawText:raw2,person,persons,timeRange,deadline,section});
  }
  return items;
}

// Format: tasks/meetings/YYYY-MM-DD.md
// ## 11:00–12:00 Название встречи
// участники: Кирилл, Эрадж
// ссылка: https://...
// описание: текст
function parseMeetingsMd(md){
  const meetings=[];
  const blocks=md.split(/(?=^##\s)/m).filter(b=>b.trim());
  for(const block of blocks){
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length)continue;
    const header=lines[0].replace(/^##\s*/,'').trim();
    const timeM=header.match(/(\d{1,2}:\d{2})\s*[–\-]\s*(\d{1,2}:\d{2})/);
    if(!timeM)continue;
    const timeRange=`${timeM[1]}–${timeM[2]}`;
    const title=header.replace(/(\d{1,2}:\d{2})\s*[–\-]\s*(\d{1,2}:\d{2})\s*/,'').trim();
    const [sh,sm]=timeM[1].split(':').map(Number);
    const [eh,em]=timeM[2].split(':').map(Number);
    const sortKey=sh*60+sm;
    let persons=[],link=null,desc=null;
    for(const l of lines.slice(1)){
      const ll=l.toLowerCase();
      if(ll.startsWith('участники:'))persons=l.replace(/участники:\s*/i,'').split(',').map(p=>p.trim()).filter(Boolean);
      else if(ll.startsWith('ссылка:'))link=l.replace(/ссылка:\s*/i,'').trim();
      else if(ll.startsWith('описание:'))desc=l.replace(/описание:\s*/i,'').trim();
    }
    meetings.push({type:'meeting',timeRange,title,persons,link,desc,sortKey,
      startMin:sh*60+sm, endMin:eh*60+em});
  }
  return meetings.sort((a,b)=>a.sortKey-b.sortKey);
}

function renderMeetingCard(m){
  const pChips=m.persons.map(p=>`<span class="chip cp">👤 ${esc(p)}</span>`).join('');
  return `<div class="meeting-card">
    <div class="meeting-time-col">
      <span class="meeting-icon">📅</span>
      <span class="meeting-time">${esc(m.timeRange)}</span>
    </div>
    <div class="meeting-body">
      <div class="meeting-title">${esc(m.title)}</div>
      ${m.desc?`<div class="meeting-desc">${esc(m.desc)}</div>`:''}
      ${m.persons.length?`<div class="meeting-meta">${pChips}</div>`:''}
      ${m.link?`<a class="meeting-link" href="${esc(m.link)}" target="_blank" rel="noopener">🔗 Подключиться</a>`:''}
    </div>
  </div>`;
}

// Возвращает Set ключей задач, которые пересекаются по времени с встречами
function detectConflicts(tasks,meetings){
  const conflictKeys=new Set();
  if(!meetings.length)return conflictKeys;
  tasks.forEach(t=>{
    if(!t.timeRange)return;
    const parts=t.timeRange.split('–');
    if(parts.length<2)return;
    const[ths,tms]=parts[0].split(':').map(Number);
    const[the,tme]=parts[1].split(':').map(Number);
    if(isNaN(ths)||isNaN(the))return;
    const tStart=ths*60+tms,tEnd=the*60+tme;
    for(const m of meetings){
      if(tStart<m.endMin&&tEnd>m.startMin){
        conflictKeys.add(djb2(t.rawText||t.text));
        break;
      }
    }
  });
  return conflictKeys;
}

// Базовый список-рендер (день / полгода / год)
function renderPanelList(el,period,file,tasks,meetings=[]){
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  const base=file.split('/').pop();
  let html=`<div class="period-hdr"><span class="period-title">${PERIODS[period].label}</span><span class="period-date">${humanDate(base.replace('.md',''))}</span></div>`;
  if(total>0)html+=`<div class="prog-wrap"><span class="prog-label">Прогресс</span><div class="prog-outer"><div class="prog-inner" id="pb-${period}"></div></div><span class="prog-pct">${pct}%</span><span class="prog-cnt">${done}/${total}</span></div>`;

  // Встречи — перед задачами
  if(meetings.length){
    html+=`<div class="meetings-section">`;
    html+=`<div class="meetings-hdr">📅 Встречи <span class="mhdr-cnt">${meetings.length}</span></div>`;
    meetings.forEach(m=>html+=renderMeetingCard(m));
    html+=`</div>`;
  }

  const conflicts=detectConflicts(tasks,meetings);
  html+=`<div class="task-list">`;
  const secs=[...new Set(tasks.map(t=>t.section))];
  for(const s of secs){
    if(s)html+=`<div class="sec-heading">${esc(s)}</div>`;
    for(const t of tasks.filter(x=>x.section===s)){
      const key=djb2(t.rawText||t.text);
      html+=renderCard(t,conflicts.has(key));
    }
  }
  html+=`</div>`;
  el.innerHTML=html;
  requestAnimationFrame(()=>{const pb=document.getElementById('pb-'+period);if(pb)pb.style.width=pct+'%';});
  const badge=document.getElementById('badge-'+period);
  if(badge&&total>0){badge.textContent=total-done||'✓';badge.classList.add('show');}
  el.querySelectorAll('.task-card').forEach(card=>{attachEdit(card);attachFileHandlers(card);});
  applyFilters();
  renderTeam();
}

function renderMiniMonth(year,month,meetingsByDate={}){
  const todayStr=tdStr();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  let html=`<div class="mini-month"><div class="mini-month-hdr">${MONTHS_RU[month]}</div><div class="mini-month-grid">`;
  DOW_MIN.forEach(d=>{html+=`<div class="mini-dow">${d}</div>`;});
  for(let i=0;i<startDow;i++)html+=`<div class="mini-cell mc-empty"></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=`${year}-${pad(month+1)}-${pad(d)}`;
    const isToday=ds===todayStr;
    const hasMtg=(meetingsByDate[ds]||[]).length>0;
    const offType=isOffDay(ds); // 'weekend', 'holiday', or null

    html+=`<div class="${cls}" onclick="miniDayClick('${ds}')" title="${ds}">${d}</div>`;

  return html;
}

async function miniDayClick(dateStr){
  // Ищем detail-панель в активной вкладке
  const detail=document.querySelector('#mini-detail[data-date],#mini-detail-yr[data-date]')||document.getElementById('mini-detail')||document.getElementById('mini-detail-yr');
  if(!detail)return;
  const CLOSE=`this.closest('.mini-detail').style.display='none'`;
  if(detail.dataset.date===dateStr&&detail.style.display!=='none'){detail.style.display='none';detail.dataset.date='';return;}
  detail.dataset.date=dateStr;detail.style.display='block';
  detail.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="period-date">${humanDate(dateStr)}</span><button class="cal-close-btn" onclick="${CLOSE}">✕</button></div><div class="loading"><div class="spinner"></div>Загрузка…</div>`;
  const [md,mmd]=await Promise.all([fetchMd(`tasks/day/${dateStr}.md`),fetchMd(`tasks/meetings/${dateStr}.md`)]);
  const dayTasks=md?parseMd(md):[];const dayMtgs=mmd?parseMeetingsMd(mmd):[];
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="period-date">${humanDate(dateStr)}</span><button class="cal-close-btn" onclick="${CLOSE}">✕</button></div>`;

  else{
    if(dayMtgs.length){html+=`<div class="meetings-section">`;dayMtgs.forEach(m=>html+=renderMeetingCard(m));html+=`</div>`;}
    if(dayTasks.length){html+=`<div class="task-list">`;dayTasks.forEach(t=>html+=renderCard(t));html+=`</div>`;}

// ─── НЕДЕЛЯ: сетка по дням ───────────────────────────────────
const WEEK_DAYS=[
  {ru:'понедельник',short:'Пн',dow:0},{ru:'вторник',short:'Вт',dow:1},
  {ru:'среда',short:'Ср',dow:2},{ru:'четверг',short:'Чт',dow:3},
  {ru:'пятница',short:'Пт',dow:4},{ru:'суббота',short:'Сб',dow:5},
  {ru:'воскресенье',short:'Вс',dow:6},
];

function renderWeekCalendar(el,period,file,tasks,meetings=[]){
  // Всегда сетка 7 столбцов
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  const base=file.split('/').pop();
  const todayDow=(new Date().getDay()+6)%7; // Mon=0
  const wDates=weekDates(); // ['2026-07-13',...,'2026-07-19']
  // meetings может быть массивом (day) или объектом {dateStr: []} (week)
  const meetingsByDate=Array.isArray(meetings)?{}:meetings;

  let html=`<div class="period-hdr"><span class="period-title">${PERIODS[period].label}</span><span class="period-date">${humanDate(base.replace('.md',''))}</span></div>`;
  if(total>0)html+=`<div class="prog-wrap"><span class="prog-label">Прогресс</span><div class="prog-outer"><div class="prog-inner" id="pb-${period}"></div></div><span class="prog-pct">${pct}%</span><span class="prog-cnt">${done}/${total}</span></div>`;
  html+=`<div class="cal-week-grid">`;

  WEEK_DAYS.forEach((d,i)=>{
    const colDate=wDates[i];
    // Задачи из недельного файла (по секции дня) + задачи из индивидуального дневного файла
    const weekFileTasks=tasks.filter(t=>t.section&&t.section.toLowerCase().includes(d.ru));
    const dayFileTasks=_weekDayTasks[colDate]||[];
    const seenKeys=new Set(weekFileTasks.map(t=>djb2(t.rawText||t.text)));
    const dayTasks=[...weekFileTasks,...dayFileTasks.filter(t=>!seenKeys.has(djb2(t.rawText||t.text)))];
    // Встречи для конкретной даты этого столбца
    const dayMeetings=meetingsByDate[colDate]||[];
    const dayDone=dayTasks.filter(t=>t.done).length;
    const isToday=d.dow===todayDow;
    const offDay=isOffDay(colDate); // 'weekend', 'holiday', or null
    const conflicts=detectConflicts(dayTasks,dayMeetings);
    const colCls='cal-week-col'+(isToday?' cal-today-col':'')+(offDay?' cal-offday':'');
    html+=`<div class="${colCls}">
      <div class="cal-week-hdr">
        <span>${d.short}</span>
        ${(dayTasks.length+dayMeetings.length)?`<span class="cal-day-count">${dayDone}/${dayTasks.length}${dayMeetings.length?` ·${dayMeetings.length}📅`:''}</span>`:''}
      </div>
      <div class="task-list">`;
    if(offDay)html+=`<div class="offday-badge">выходной</div>`;
    if(!dayTasks.length&&!dayMeetings.length&&!offDay)html+=`<div class="cal-empty-day">—</div>`;
    dayMeetings.forEach(m=>html+=renderMeetingCard(m));
    dayTasks.forEach(t=>html+=renderWeekChip(t,conflicts.has(djb2(t.rawText||t.text))));
    html+=`</div></div>`;
  });

  html+=`</div>`;

  // Задачи без привязки к конкретному дню недели
  const noDayTasks=tasks.filter(t=>!t.section||!WEEK_DAYS.some(d=>t.section.toLowerCase().includes(d.ru)));
  if(noDayTasks.length){
    html+=`<div class="cal-noday-section"><div class="cal-noday-hdr">📋 Задачи недели без привязки к дню (${noDayTasks.filter(t=>t.done).length}/${noDayTasks.length})</div><div class="task-list">`;
    noDayTasks.forEach(t=>html+=renderWeekChip(t,false));
    html+=`</div></div>`;
  }

  el.innerHTML=html;
  requestAnimationFrame(()=>{const pb=document.getElementById('pb-'+period);if(pb)pb.style.width=pct+'%';});
  const badge=document.getElementById('badge-'+period);
  if(badge&&total>0){badge.textContent=total-done||'✓';badge.classList.add('show');}
  applyFilters();renderTeam();
}

// ─── МЕСЯЦ: сетка-календарь + список задач ───────────────────
function renderMonthCalendar(el,period,file,tasks,meetings={}){
  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7; // Пн=0
  const todayStr=tdStr();
  const meetingsByDate=Array.isArray(meetings)?{}:meetings;

  const total=tasks.length,done=tasks.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  const base=file.split('/').pop();

  let html=`<div class="period-hdr"><span class="period-title">${PERIODS[period].label}</span><span class="period-date">${humanDate(base.replace('.md',''))}</span></div>`;
  if(total>0)html+=`<div class="prog-wrap"><span class="prog-label">Прогресс</span><div class="prog-outer"><div class="prog-inner" id="pb-${period}"></div></div><span class="prog-pct">${pct}%</span><span class="prog-cnt">${done}/${total}</span></div>`;

  html+=`<div class="cal-month-grid">
    <div class="cal-dow">Пн</div><div class="cal-dow">Вт</div><div class="cal-dow">Ср</div>
    <div class="cal-dow">Чт</div><div class="cal-dow">Пт</div><div class="cal-dow">Сб</div>
    <div class="cal-dow">Вс</div>`;

  for(let i=0;i<startDow;i++)html+=`<div class="cal-day-cell cal-day-empty"></div>`;

  for(let d=1;d<=lastDay.getDate();d++){
    const dateStr=`${year}-${pad(month+1)}-${pad(d)}`;
    const isToday=dateStr===todayStr;
    const dow=(new Date(year,month,d).getDay()+6)%7;
    const isWeekend=dow>=5;
    const isHoliday=RU_HOLIDAYS_2026.has(dateStr);
    const _mts=meetingsByDate[dateStr]||[];
    const _miniMts=_mts.map(m=>`<div class="cal-mini-meeting" title="${esc(m.title)}">📅 ${m.timeRange?m.timeRange.split('–')[0]+' ':''}<b>${esc(m.title)}</b></div>`).join('');
    html+=`<div class="cal-day-cell${isToday?' cal-today':''}${isWeekend?' cal-weekend':''}${isHoliday?' cal-holiday':''}" data-date="${dateStr}" onclick="calMonthDayClick('${dateStr}')">
      <div class="cal-day-num">${d}${_mts.length?`<span style="float:right;font-size:8px;color:#89b4ff;font-weight:400;opacity:.8">${_mts.length}📅</span>`:''}</div>
      ${_miniMts}
      <div id="cal-d-${dateStr}" class="cal-day-dots"></div>
    </div>`;
  }
  html+=`</div>`;
  html+=`<div id="cal-month-detail" class="cal-month-detail" style="display:none" data-date=""></div>`;

  // Секция со всеми задачами месяца ниже календаря
  if(tasks.length>0){
    html+=`<div class="cal-section-tasks">`;
    const secs=[...new Set(tasks.map(t=>t.section))];
    for(const s of secs){
      if(s)html+=`<div class="sec-heading">${esc(s)}</div>`;
      html+=`<div class="task-list">`;
      for(const t of tasks.filter(x=>x.section===s))html+=renderCard(t);
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  el.innerHTML=html;
  requestAnimationFrame(()=>{const pb=document.getElementById('pb-'+period);if(pb)pb.style.width=pct+'%';});
  const badge=document.getElementById('badge-'+period);
  if(badge&&total>0){badge.textContent=total-done||'✓';badge.classList.add('show');}
  el.querySelectorAll('.task-card').forEach(card=>{attachEdit(card);attachFileHandlers(card);});

  // Подсветка сегодня — показываем сводку из уже загруженных задач
  // (dayTasks из loadAll не доступны здесь, но после загрузки calMonthDayClick подтянет)
  applyFilters();renderTeam();
}

async function calMonthDayClick(dateStr){
  const detail=document.getElementById('cal-month-detail');
  if(!detail)return;

  // Тоггл: кликнули на уже открытый день → закрываем
  if(detail.dataset.date===dateStr&&detail.style.display!=='none'){
    detail.style.display='none';detail.dataset.date='';
    document.querySelectorAll('.cal-day-cell').forEach(c=>c.classList.remove('cal-day-active'));
    return;
  }

  document.querySelectorAll('.cal-day-cell').forEach(c=>c.classList.remove('cal-day-active'));
  const cell=document.querySelector(`.cal-day-cell[data-date="${dateStr}"]`);
  if(cell){cell.classList.add('cal-day-active');cell.scrollIntoView({behavior:'smooth',block:'nearest'});}

  detail.dataset.date=dateStr;
  detail.style.display='block';
  detail.innerHTML=`<div class="loading"><div class="spinner"></div>Загрузка ${humanDate(dateStr)}…</div>`;

  const [md, mmd]=await Promise.all([
    fetchMd(`tasks/day/${dateStr}.md`),
    fetchMd(`tasks/meetings/${dateStr}.md`),
  ]);
  const dayTasks=md?parseMd(md):[];
  const dayMeetings=mmd?parseMeetingsMd(mmd):[];
  const CLOSE=`document.getElementById('cal-month-detail').style.display='none';document.querySelectorAll('.cal-day-cell').forEach(c=>c.classList.remove('cal-day-active'))`;
  if(!dayTasks.length&&!dayMeetings.length){
    detail.innerHTML=`<div class="cal-detail-hdr"><span class="period-date">${humanDate(dateStr)}</span><button class="cal-close-btn" onclick="${CLOSE}">✕</button></div><div class="empty"><div class="empty-icon">📭</div><p>Нет задач</p></div>`;
    return;
  }

  const doneC=dayTasks.filter(t=>t.done).length;
  const pctD=dayTasks.length?Math.round(doneC/dayTasks.length*100):0;

  let html=`<div class="cal-detail-hdr">
    <span class="period-date">${humanDate(dateStr)}</span>
    ${dayTasks.length?`<span style="font-size:.71rem;color:var(--muted)">${doneC}/${dayTasks.length} · ${pctD}%</span>`:''}
    <button class="cal-close-btn" onclick="${CLOSE}">✕</button>
  </div>`;
  if(dayMeetings.length){
    html+=`<div class="meetings-section">`;
    dayMeetings.forEach(m=>html+=renderMeetingCard(m));
    html+=`</div>`;
  }
  if(dayTasks.length){
    html+=`<div class="task-list">`;
    dayTasks.forEach(t=>html+=renderCard(t));
    html+=`</div>`;
  }
  detail.innerHTML=html;
  detail.querySelectorAll('.task-card').forEach(card=>{attachEdit(card);attachFileHandlers(card);});

  // Точка на клетке
  const dotEl=document.getElementById(`cal-d-${dateStr}`);
  if(dotEl)dotEl.innerHTML=`<span class="cal-dot" style="background:${doneC===dayTasks.length?'var(--done)':'var(--acc)'}"></span>`;
}

function renderCard(task,isConflict=false){
  const edits=ls(K_EDITS,{});
  const checks=ls(K_CHECKS,{});
  const key=djb2(task.rawText||task.text);
  const disp=edits[key]||task.text;
  // localStorage check override takes priority over markdown state
  const isDone=checks.hasOwnProperty(key)?checks[key]:task.done;
  const mi=TEAM.find(m=>task.rawText?.toLowerCase().includes(m.k));
  const borderC=mi?mi.tx:null;
  let meta='';
  // multiple persons support
  const pList=task.persons?.length?task.persons:task.person?[task.person]:[];
  pList.forEach(p=>{ meta+=`<span class="chip cp">👤 ${esc(p)}</span>`; });
  if(task.timeRange)meta+=`<span class="chip ct">🕐 ${esc(task.timeRange)}</span>`;
  if(task.deadline)meta+=`<span class="chip cd">📅 ${esc(task.deadline)}</span>`;
  if(isConflict)meta+=`<span class="conflict-badge">⚠️ пересечение со встречей</span>`;
  const files=ls(K_FILES,{});
  const tf=files[key]||[];
  let fhtml='';
  if(tf.length>0){fhtml=`<div class="attach-row" id="ar-${key}">`;tf.forEach((f,i)=>{fhtml+=`<a class="file-chip" href="${esc(f.dataUrl)}" download="${esc(f.name)}" title="${esc(f.name)}">📄 <span class="fcn">${esc(f.name)}</span><span class="fcd" data-key="${key}" data-idx="${i}" onclick="delTaskFile(event)">×</span></a>`;});fhtml+=`</div>`;}
  else fhtml=`<div class="attach-row" id="ar-${key}"></div>`;
  return `<div class="task-card${isDone?' done':''}${isConflict?' conflict':''}" data-key="${key}"${borderC?` style="--acc:${borderC}"`:''}><div class="task-check${isDone?' checked':''}" onclick="toggleCheck(event,'${key}')"></div><div class="task-body"><div class="task-text">${esc(disp)}</div><textarea class="edit-area" rows="2">${esc(disp)}</textarea><div class="edit-btns"><button class="btn-save">Сохранить</button><button class="btn-cancel">Отмена</button></div>${meta?`<div class="task-meta">${meta}</div>`:''}${fhtml}<button class="attach-btn" data-key="${key}" onclick="openTaskFile(event)">📎 Прикрепить</button></div><button class="edit-btn" title="Редактировать">✏️</button></div>`;
}

function renderEmpty(el,period,file){const base=file.split('/').pop();el.innerHTML=`<div class="period-hdr"><span class="period-title">${PERIODS[period].label}</span><span class="period-date">${humanDate(base.replace('.md',''))}</span></div><div class="empty"><div class="empty-icon">📭</div><p>Нет задач</p><p style="margin-top:5px;font-size:.7rem">Файл <code>${file}</code> не найден</p></div>`;}
function renderLoading(el){el.innerHTML=`<div class="loading"><div class="spinner"></div>Загрузка…</div>`;}

let editing=false;
function attachEdit(card){
  const eBtn=card.querySelector('.edit-btn'),textEl=card.querySelector('.task-text'),area=card.querySelector('.edit-area'),btns=card.querySelector('.edit-btns'),key=card.dataset.key;
  if(!eBtn)return;
  const open=()=>{if(editing)return;editing=true;area.value=textEl.textContent;textEl.style.display='none';area.classList.add('open');btns.classList.add('open');area.focus();area.setSelectionRange(area.value.length,area.value.length);};
  const close=()=>{textEl.style.display='';area.classList.remove('open');btns.classList.remove('open');editing=false;};
  const save=()=>{const v=area.value.trim();if(!v)return;textEl.textContent=v;const d=ls(K_EDITS,{});d[key]=v;sv(K_EDITS,d);logAct(`✏️ ${v.slice(0,20)}…`);close();};
  eBtn.addEventListener('click',e=>{e.stopPropagation();open();});
  btns.querySelector('.btn-save').addEventListener('click',e=>{e.stopPropagation();save();});
  btns.querySelector('.btn-cancel').addEventListener('click',e=>{e.stopPropagation();close();});
  area.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();save();}if(e.key==='Escape')close();});
}

// Toggle checkbox state (persists in localStorage, overrides markdown)
function toggleCheck(e,key){
  e.stopPropagation();
  const checkEl=e.currentTarget;
  const card=checkEl.closest('.task-card');
  const newDone=!checkEl.classList.contains('checked');
  checkEl.classList.toggle('checked',newDone);
  card.classList.toggle('done',newDone);
  const textEl=card.querySelector('.task-text');
  if(textEl)textEl.style.textDecoration=newDone?'line-through':'';
  const checks=ls(K_CHECKS,{});checks[key]=newDone;sv(K_CHECKS,checks);
  logAct(newDone?'✅ Выполнено':'↩️ Возвращено');
}

let pendingTaskKey=null;
const gfi=document.getElementById('g-file-input');
function openTaskFile(e){e.stopPropagation();pendingTaskKey=e.currentTarget.dataset.key;gfi.value='';gfi.click();}
function attachFileHandlers(card){}
gfi.addEventListener('change',()=>{
  const key=pendingTaskKey;if(!key)return;
  const fa=Array.from(gfi.files);let done2=0;
  fa.forEach(file=>{
    if(file.size>4*1024*1024){alert(`${file.name} > 4МБ, пропускаем`);done2++;chk();return;}
    const r=new FileReader();
    r.onload=ev=>{const d=ls(K_FILES,{});d[key]=d[key]||[];d[key].push({name:file.name,size:file.size,dataUrl:ev.target.result});sv(K_FILES,d);logAct(`📎 ${file.name}`);done2++;chk();};
    r.readAsDataURL(file);
  });
  function chk(){if(done2===fa.length)refreshTaskAttach(key);}
});
function refreshTaskAttach(key){
  const ar=document.getElementById('ar-'+key);if(!ar)return;
  const files=ls(K_FILES,{})[key]||[];ar.innerHTML='';
  files.forEach((f,i)=>{const a=document.createElement('a');a.className='file-chip';a.href=f.dataUrl;a.download=f.name;a.title=f.name;a.innerHTML=`📄 <span class="fcn">${esc(f.name)}</span><span class="fcd" data-key="${key}" data-idx="${i}" onclick="delTaskFile(event)">×</span>`;ar.appendChild(a);});
}
function delTaskFile(e){e.preventDefault();e.stopPropagation();const{key,idx}=e.currentTarget.dataset;const d=ls(K_FILES,{});if(d[key])d[key].splice(+idx,1);sv(K_FILES,d);refreshTaskAttach(key);}

let activeMember=null;
function renderTeam(){
  const bar=document.getElementById('team-bar');if(!bar)return;
  bar.querySelectorAll('.member-chip').forEach(el=>el.remove());
  const label=bar.querySelector('.team-label');
  TEAM.forEach(m=>{
    const taskCnt=countForMember(m.k);
    const mtgCnt=meetingCountForMember(m.k);
    const chip=document.createElement('div');
    chip.className='member-chip'+(activeMember===m.k?' active':'');
    chip.innerHTML=`<div class="m-av" style="background:${m.bg};color:${m.tx}">${m.name[0]}</div><span class="m-name">${m.name}</span>${taskCnt>0?`<span class="m-cnt">${taskCnt}</span>`:''}${mtgCnt>0?`<span class="m-mtg">📅${mtgCnt}</span>`:''}`;
    chip.onclick=()=>{activeMember=activeMember===m.k?null:m.k;document.getElementById('filter-clear').classList.toggle('show',!!activeMember);applyFilters();renderTeam();};
    label.insertAdjacentElement('afterend',chip);
  });
}
// Задачи из DOM (день-вид)
function countForMember(k){let n=0;document.querySelectorAll('.task-card').forEach(c=>{if(c.textContent.toLowerCase().includes(k))n++;});return n;}
// Предстоящие встречи из накопленного _allMeetingsByDate
function meetingCountForMember(k){
  const today=tdStr();let n=0;
  Object.entries(_allMeetingsByDate).forEach(([ds,mtgs])=>{
    if(ds>=today)mtgs.forEach(m=>{if(m.persons.some(p=>p.toLowerCase().includes(k)))n++;});
  });
  return n;
}
function clearMember(){activeMember=null;document.getElementById('filter-clear').classList.remove('show');applyFilters();renderTeam();}

function applyFilters(){
  const cards=document.querySelectorAll('.task-card');let vis=0;
  cards.forEach(card=>{
    const textEl=card.querySelector('.task-text');const ft=card.textContent.toLowerCase();const orig=textEl?textEl.textContent:'';
    if(textEl){if(searchQ){const idx=orig.toLowerCase().indexOf(searchQ);if(idx!==-1){textEl.innerHTML=esc(orig.slice(0,idx))+`<mark>${esc(orig.slice(idx,idx+searchQ.length))}</mark>`+esc(orig.slice(idx+searchQ.length));}else textEl.textContent=orig;}else if(textEl.innerHTML!==esc(orig))textEl.textContent=orig;}
    const ms=!searchQ||ft.includes(searchQ),mm=!activeMember||ft.includes(activeMember);
    card.classList.toggle('h-search',!ms);card.classList.toggle('h-member',!mm);card.classList.toggle('found',!!(searchQ||activeMember)&&ms&&mm);
    if(ms&&mm)vis++;
  });
  searchCount.textContent=(searchQ||activeMember)?`${vis} из ${cards.length}`:'';
}

// ═══════════════════════════════════════════════════════════════
let _wkTaskMap={};  // key → task object для expand по клику

function renderWeekChip(t,isConflict){
  const key=djb2(t.rawText||t.text);
  _wkTaskMap[key]=t;
  const isDone=t.done;
  const cls='wk-chip'+(isDone?' wk-done':'')+(isConflict?' wk-conflict':'');
  const timeStr=t.timeRange?`<span class="wk-chip-time">${esc(t.timeRange.split('–')[0])}</span>`:'';
  return `<div class="${cls}" data-key="${key}" onclick="wkToggleChip(this)"><div class="wk-chip-dot"></div><span class="wk-chip-text">${esc(t.text)}</span>${timeStr}</div>`;
}

function wkToggleChip(el){
  const next=el.nextElementSibling;
  if(next&&next.classList.contains('wk-task-detail')){next.remove();return;}
  el.closest('.task-list')?.querySelectorAll('.wk-task-detail').forEach(d=>d.remove());
  const t=_wkTaskMap[el.dataset.key];if(!t)return;
  const detail=document.createElement('div');detail.className='wk-task-detail';
  const persons=t.persons?.length?t.persons:(t.person?[t.person]:[]);
  const meta=[];
  if(persons.length)meta.push(persons.map(p=>`<span class="wk-td-tag">👤 ${esc(p)}</span>`).join(''));
  if(t.timeRange)meta.push(`<span class="wk-td-tag">🕐 ${esc(t.timeRange)}</span>`);
  if(t.tag)meta.push(`<span class="wk-td-tag">🏷 ${esc(t.tag)}</span>`);
  detail.innerHTML=`<div class="wk-td-text">${esc(t.text)}</div>${meta.length?`<div class="wk-td-meta">${meta.join('')}</div>`:''}`;
  el.after(detail);
}

let selectedProjId=null;

window._projSelected=false;
function selectProj(id){
  selectedProjId=id;window._projSelected=true;
  renderProjList();renderFilesArea();
}

function delProj(e){
  e.stopPropagation();
  const id=e.currentTarget.dataset.id;
  const projs=ls(K_PROJ,[]);const idx=projs.findIndex(p=>p.id===id);if(idx===-1)return;
  const name=projs[idx].name;
  if(!confirm(`Удалить проект «${name}»? Файлы останутся без проекта.`))return;
  projs.splice(idx,1);sv(K_PROJ,projs);
  const pfiles=ls(K_PFILES,[]);pfiles.forEach(f=>{if(f.projId===id)f.projId=null;});sv(K_PFILES,pfiles);
  if(selectedProjId===id){selectedProjId=null;window._projSelected=false;}
  renderProjList();if(window._projSelected)renderFilesArea();
  logAct(`🗑 Проект удалён: ${name}`);
}

function renderFilesArea(){
  const area=document.getElementById('files-area');if(!area)return;
  const projs=ls(K_PROJ,[]);
  const pfiles=ls(K_PFILES,[]);
  const filtered=selectedProjId===null?pfiles:pfiles.filter(f=>f.projId===selectedProjId);
  const proj=projs.find(p=>p.id===selectedProjId);
  const titleTxt=proj?proj.name:'Все файлы';
  const totalSize=filtered.reduce((a,f)=>a+f.size,0);

  area.innerHTML=`<div class="files-area-hdr">
    <div>
      <div class="files-area-title">${proj?`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${proj.color};margin-right:6px"></span>`:'📁 '}${esc(titleTxt)}</div>
      <div class="files-count" style="margin-top:2px">${filtered.length} файлов · <span class="files-storage">${fmtSize(totalSize)}</span></div>
    </div>
    <button class="files-upload-btn" onclick="openProjUpload()">📤 Загрузить</button>
  </div>
  <div class="files-grid" id="files-grid"></div>`;

  const grid=document.getElementById('files-grid');
  if(!filtered.length){grid.innerHTML=`<div class="files-empty" style="grid-column:1/-1"><div class="files-empty-icon">📭</div><p style="font-size:.82rem">Нет файлов</p><p style="font-size:.72rem;margin-top:4px;color:var(--muted)">Нажмите «Загрузить» чтобы добавить</p></div>`;return;}

  filtered.forEach(f=>{
    const fp=projs.find(p=>p.id===f.projId);
    const card=document.createElement('div');card.className='file-card';
    card.innerHTML=`
      <span class="file-del-overlay" data-id="${f.id}" onclick="delProjFile(event)">✕</span>
      <div class="file-icon">${fileIcon(f.name)}</div>
      <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
      <div class="file-size">${fmtSize(f.size)}</div>
      <div class="file-date">${fmtDate(f.date)}</div>
      ${fp&&selectedProjId===null?`<span class="file-proj-badge" style="background:${fp.color}22;color:${fp.color};border:1px solid ${fp.color}44">${esc(fp.name)}</span>`:''}
      <select class="file-move-sel" data-id="${f.id}" onchange="moveFileToProj(event)">
        <option value="">— Переместить в… —</option>
        ${projs.map(p=>`<option value="${p.id}"${p.id===f.projId?' selected':''}>${esc(p.name)}</option>`).join('')}
        <option value="__none"${!f.projId?' selected':''}>Без проекта</option>
      </select>
      <div class="file-actions">
        <a class="fa-btn fa-dl" href="${esc(f.dataUrl)}" download="${esc(f.name)}">⬇ Скачать</a>
      </div>`;
    grid.appendChild(card);
  });
}

function moveFileToProj(e){
  const id=e.currentTarget.dataset.id,val=e.currentTarget.value;
  if(!val)return;
  const pfiles=ls(K_PFILES,[]);const f=pfiles.find(x=>x.id===id);
  if(f)f.projId=val==='__none'?null:val;
  sv(K_PFILES,pfiles);renderProjList();if(window._projSelected)renderFilesArea();
}

const pfi=document.getElementById('proj-file-input');
function openProjUpload(){pfi.value='';pfi.click();}
pfi.addEventListener('change',()=>{
  const fa=Array.from(pfi.files);let done=0;
  fa.forEach(file=>{
    if(file.size>8*1024*1024){alert(`${file.name} > 8МБ, пропускаем`);done++;chk2();return;}
    const r=new FileReader();
    r.onload=ev=>{
      const pfiles=ls(K_PFILES,[]);
      pfiles.push({id:uid(),name:file.name,size:file.size,dataUrl:ev.target.result,projId:selectedProjId,date:Date.now(),type:file.type});
      sv(K_PFILES,pfiles);logAct(`📁 ${file.name}`);done++;chk2();
    };r.readAsDataURL(file);
  });
  function chk2(){if(done===fa.length){renderProjList();if(window._projSelected)renderFilesArea();}}
});

function delProjFile(e){
  e.stopPropagation();const id=e.currentTarget.dataset.id;
  const pfiles=ls(K_PFILES,[]);const idx=pfiles.findIndex(f=>f.id===id);
  if(idx===-1)return;const name=pfiles[idx].name;
  pfiles.splice(idx,1);sv(K_PFILES,pfiles);
  logAct(`🗑 ${name}`);renderProjList();if(window._projSelected)renderFilesArea();
}

function quickAdd(){const t=document.getElementById('qa-text')?.value.trim();if(!t)return;const p=document.getElementById('qa-period')?.value||'day';const pending=ls('fw-pending',[]);pending.push({text:t,period:p,ts:Date.now()});sv('fw-pending',pending);document.getElementById('qa-text').value='';logAct(`➕ ${t.slice(0,24)}${t.length>24?'…':''}`);}

function toggleActions(){const w=document.getElementById('actions-wrap'),b=document.getElementById('act-toggle-btn');w.classList.toggle('open');b.classList.toggle('on',w.classList.contains('open'));}

document.getElementById('tabs-bar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');if(!btn)return;
  const tab=btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));

});

// ═══════════════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function loadAll(){
  if(editing)return;
  const rr=document.getElementById('ref-row');if(rr)rr.classList.add('refreshing');
  const now=new Date();
  document.getElementById('last-updated').innerHTML=`<strong>${now.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</strong>`;
  let dayTasks=[],dayMeetings=[];
  _allMeetingsByDate={};  // сброс перед загрузкой
  for(const [period,cfg] of Object.entries(PERIODS)){
    const panel=document.getElementById('panel-'+period);
    const file=cfg.fn();renderLoading(panel);
    const md=await fetchMd(file);
    // Подтягиваем встречи для дня и недели
    let meetings=[];
    if(period==='day'){
      const mmd=await fetchMd(`tasks/meetings/${tdStr()}.md`);
      meetings=mmd?parseMeetingsMd(mmd):[];
      dayMeetings=meetings;
    }
    if(period==='week'){
      // Загружаем встречи и задачи дня для каждого дня текущей недели
      const wDates=weekDates();
      const wMap={};
      _weekDayTasks={};
      await Promise.all(wDates.map(async ds=>{
        const [mmd,dmd]=await Promise.all([
          fetchMd(`tasks/meetings/${ds}.md`),
          fetchMd(`tasks/day/${ds}.md`),
        ]);
        if(mmd)wMap[ds]=parseMeetingsMd(mmd);
        if(dmd)_weekDayTasks[ds]=parseMd(dmd);
      }));
      meetings=wMap; // объект {dateStr: meetings[]}
    }
    if(period==='month'){
      // Загружаем встречи для каждого дня текущего месяца
      const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
      const days=new Date(yr,mo+1,0).getDate();
      const mMap={};
      await Promise.all(Array.from({length:days},(_,i)=>{
        const ds=`${yr}-${pad(mo+1)}-${pad(i+1)}`;
        return fetchMd(`tasks/meetings/${ds}.md`).then(mmd=>{if(mmd)mMap[ds]=parseMeetingsMd(mmd);});
      }));
      meetings=mMap;
    }
    if(period==='halfyear'){
      const now2=new Date(),yr2=now2.getFullYear(),startMo2=now2.getMonth()<6?0:6;
      const mMap2={};const fx2=[];
      for(let mo=startMo2;mo<startMo2+6;mo++){const days=new Date(yr2,mo+1,0).getDate();for(let d=1;d<=days;d++){const ds=`${yr2}-${pad(mo+1)}-${pad(d)}`;fx2.push(fetchMd(`tasks/meetings/${ds}.md`).then(mmd=>{if(mmd)mMap2[ds]=parseMeetingsMd(mmd);}));}}
      await Promise.all(fx2);meetings=mMap2;
    }
    if(period==='year'){
      const yr3=new Date().getFullYear();
      const mMap3={};const fx3=[];
      for(let mo=0;mo<12;mo++){const days=new Date(yr3,mo+1,0).getDate();for(let d=1;d<=days;d++){const ds=`${yr3}-${pad(mo+1)}-${pad(d)}`;fx3.push(fetchMd(`tasks/meetings/${ds}.md`).then(mmd=>{if(mmd)mMap3[ds]=parseMeetingsMd(mmd);}));}}
      await Promise.all(fx3);meetings=mMap3;
    }
    // Накапливаем встречи для тим-бара
    if(Array.isArray(meetings)){if(meetings.length&&period==='day')_allMeetingsByDate[tdStr()]=meetings;}
    else{Object.entries(meetings).forEach(([ds,mtgs])=>{_allMeetingsByDate[ds]=mtgs;});}
    // Проверяем есть ли встречи (meetings может быть массивом или объектом-картой)
    const hasMtgs=Array.isArray(meetings)
      ?meetings.length>0
      :Object.values(meetings).some(a=>a.length>0);
    if(!md){
      if(period==='week')renderPanel(panel,period,file,[],meetings); // неделя всегда показывает сетку
      else if(hasMtgs)renderPanel(panel,period,file,[],meetings);
      else if(period==='halfyear'||period==='year')renderPanel(panel,period,file,[],meetings); // обзорные виды всегда рендерятся
      else renderEmpty(panel,period,file);
      continue;
    }
    const tasks=parseMd(md);
    if(!tasks.length&&!hasMtgs)renderEmpty(panel,period,file);
    else{renderPanel(panel,period,file,tasks,meetings);if(period==='day')dayTasks=tasks;}
  }
  renderTeam();renderActLog();
  if(rr)rr.classList.remove('refreshing');
  const rt=document.getElementById('ref-time');
  if(rt)rt.textContent=`обновлено ${now.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}`;
}

/* ══════════════════════════════════════════════════════════
   SYNC BUTTON
══════════════════════════════════════════════════════════ */
let SYNC_URL = null;

async function initSyncButton() {
  try {
    const r = await fetch(RAW + 'sync_config.json?_=' + Date.now());
    if (!r.ok) return;
    const cfg = await r.json();
    if (cfg.sync_url) {
      SYNC_URL = cfg.sync_url.replace(/\/$/, '');
      document.getElementById('sync-btn').style.display = 'flex';
    }
  } catch(e) {}
}

async function triggerSync() {
  if (!SYNC_URL) return;
  const btn  = document.getElementById('sync-btn');
  const lbl  = document.getElementById('sync-label');
  btn.disabled = true;
  btn.classList.add('syncing');
  lbl.textContent = 'Идёт…';

  try {
    const r = await fetch(SYNC_URL + '/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);

    // поллинг статуса каждые 2 сек
    const poll = setInterval(async () => {
      try {
        const sr = await fetch(SYNC_URL + '/status');
        const s  = await sr.json();
        if (s.status === 'done') {
          clearInterval(poll);
          lbl.textContent = '✅ Готово';
          btn.classList.remove('syncing');
          setTimeout(() => {
            btn.disabled = false;
            lbl.textContent = 'Sync';
            loadAll();
          }, 2500);
        } else if (s.status === 'error') {
          clearInterval(poll);
          lbl.textContent = '❌ Ошибка';
          btn.classList.remove('syncing');
          setTimeout(() => { btn.disabled = false; lbl.textContent = 'Sync'; }, 3000);
        }
      } catch(e) {}
    }, 2000);

  } catch(e) {
    lbl.textContent = '❌ Нет связи';
    btn.classList.remove('syncing');
    setTimeout(() => { btn.disabled = false; lbl.textContent = 'Sync'; }, 3000);
  }
}

loadAll();
initSyncButton();
setInterval(loadAll,2*60*1000);
</script>
